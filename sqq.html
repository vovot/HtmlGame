// 初始化游戏场景（不开始游戏，只显示背景）
function initScene() {
  balloons = [];
  arrows = [];
  particles = [];
  floatTexts = [];
  stuckArrows = [];
  explosions = [];
  deflectedArrows = [];
  nextBalloonY = H;
  nextBalloonYLeft = H;
  nextBalloonYRight = H;

  const s = getLevelStrategy();
  if (s && s.initScene) {
    s.initScene();
  } else {
    for (let i = 0; i < 15; i++) {
      spawnBalloon();
    }
  }
  cameraY = H;
}

function resumeGame() {
  score = 0;
  resetArrays();

  // 重置对战变量
  leftScore = 0;
  rightScore = 0;
  versusLoser = null;
  versusMode = false;

  document.getElementById('gameover-popup').style.display = 'none';
  document.getElementById('versus-result').style.display = 'none';
  document.getElementById('final-score').style.display = '';
  document.getElementById('final-info').style.display = '';

  initCountdown();
  showStartUI(false);

  const lvl = findLevel(currentLevelId);
  if (lvl && lvl.versus) {
    versusMode = true;
  }

  // 云层重置
  if (lvl && lvl.clouds) {
    cloudEnabled = true;
    cloudY = lvl.cloudY || (H - 5 * BALLOON_GAP);
    cloudOffsetLeft = -W / 2 - cloudThickness * 0.55;
    cloudOffsetRight = W / 2 + cloudThickness * 0.55;
  } else if (settingCloudEnabled) {
    cloudEnabled = true;
    cloudY = H - 8.5 * BALLOON_GAP;
    cloudOffsetLeft = -W / 2 - cloudThickness * 0.55;
    cloudOffsetRight = W / 2 + cloudThickness * 0.55;
  } else {
    cloudEnabled = false;
  }

  const s = getLevelStrategy();
  if (s && s.onResume) {
    s.onResume();
  } else {
    // 前8关：不刷新气球，不归位镜头，直接接着射击
    balloons.forEach(b => b.targeted = false);
    state = 'playing';
    startBgm();
  }

  updateColorButtons();

  // 第17关：按钮移动
  if (currentLevelId === 17) {
    setTimeout(() => initMovingButtons(), 100);
  } else {
    resetMovingButtons();
  }

  // 第18关：按钮换位进度条
  shuffleTimer = 0;
  if (currentLevelId === 18) {
    initBtnShuffle();
  } else {
    resetBtnShuffle();
  }
}

function startGame() {
  score = 0;
  resetArrays();

  // 重置对战变量
  leftScore = 0;
  rightScore = 0;
  versusLoser = null;
  versusMode = false;

  const lvl = findLevel(currentLevelId);
  if (lvl && lvl.versus) {
    versusMode = true;
    if (currentLevelId === 16 || currentLevelId === 24 || currentLevelId === 25 || currentLevelId === 26 || currentLevelId === 27 || currentLevelId === 28) {
      // 第16关/第24关/第25关：纯齿轮模式
      versusHazard = 'gear';
      gearY = H + 500;
      gearSpeed = 2.0;
      fireSticks = [];
    } else {
      versusHazard = Math.random() < 0.5 ? 'gear' : 'firestick';
      gearY = H + 500;
      gearSpeed = 1.5;
      fireSticks = [];
      for (let i = 1; i <= 30; i++) {
        fireSticks.push({ y: H - i * 7 * BALLOON_GAP, burning: false, falling: false, fallSpeed: 0 });
      }
    }
  }

  // 云层初始化
  if (lvl && lvl.clouds) {
    cloudEnabled = true;
    cloudY = lvl.cloudY || (H - 8.5 * BALLOON_GAP); // cloudY在关卡配置中设置，默认第5排气球
    cloudOffsetLeft = -W / 2 - cloudThickness * 0.55;
    cloudOffsetRight = W / 2 + cloudThickness * 0.55;
  } else {
    cloudEnabled = false;
  }

  // 保存上次玩的关卡
  lastPlayedLevel = currentLevelId;
  localStorage.setItem('arrow_lastLevel', lastPlayedLevel.toString());

  // 所有关卡：气球已在initScene中生成，不刷新
  // 只清除锁定状态
  balloons.forEach(b => b.targeted = false);
  cameraY = H;

  initCountdown();

  // 首次进入直接开始，不需要321倒计时（重新开始时resumeGame会走ready流程）
  state = 'playing';
  startBgm();

  document.getElementById('gameover-popup').style.display = 'none';
  document.getElementById('versus-result').style.display = 'none';
  document.getElementById('final-score').style.display = '';
  document.getElementById('final-info').style.display = '';
  showStartUI(false);

  // 根据关卡显示颜色按钮
  updateColorButtons();

  // 第17关：按钮移动
  if (currentLevelId === 17) {
    setTimeout(() => initMovingButtons(), 100); // 等按钮布局完成
  } else {
    resetMovingButtons();
  }

  // 第18关：按钮换位进度条
  shuffleTimer = 0;
  if (currentLevelId === 18) {
    initBtnShuffle();
  } else {
    resetBtnShuffle();
  }
}

function updateColorButtons() {
  const btns = document.getElementById('game-color-btns');
  // 先隐藏所有按钮
  ['btn-red','btn-blue','btn-green','btn-yellow','btn-left-red','btn-left-blue','btn-left-green','btn-right-red','btn-right-blue','btn-right-green'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  btns.classList.remove('v-layout', 'split-layout', 'split3-layout');

  const s = getLevelStrategy();
  if (s && s.buttonLayout === 'split3') {
    // 三色左右分区：左红+蓝+绿竖排，右红+蓝+绿竖排
    document.getElementById('btn-left-red').style.display = 'flex';
    document.getElementById('btn-left-blue').style.display = 'flex';
    document.getElementById('btn-left-green').style.display = 'flex';
    document.getElementById('btn-right-red').style.display = 'flex';
    document.getElementById('btn-right-blue').style.display = 'flex';
    document.getElementById('btn-right-green').style.display = 'flex';
    btns.classList.add('split3-layout');
  } else if (s && s.buttonLayout === 'split') {
    // 左右分区射击
    document.getElementById('btn-left-red').style.display = 'flex';
    document.getElementById('btn-left-blue').style.display = 'flex';
    document.getElementById('btn-right-blue').style.display = 'flex';
    document.getElementById('btn-right-red').style.display = 'flex';
    btns.classList.add('split-layout');
  } else {
    // 根据关卡配置的colors字段决定按钮数量
    const lvl = findLevel(currentLevelId);
    const numColors = lvl ? lvl.colors : 2;
    if (numColors >= 4) {
      // 四色V字布局
      document.getElementById('btn-red').style.display = 'flex';
      document.getElementById('btn-blue').style.display = 'flex';
      document.getElementById('btn-green').style.display = 'flex';
      document.getElementById('btn-yellow').style.display = 'flex';
      btns.classList.add('v-layout');
    } else if (numColors >= 3) {
      // 三色横排等距
      document.getElementById('btn-red').style.display = 'flex';
      document.getElementById('btn-blue').style.display = 'flex';
      document.getElementById('btn-green').style.display = 'flex';
    } else {
      // 双色横排等距
      document.getElementById('btn-red').style.display = 'flex';
      document.getElementById('btn-blue').style.display = 'flex';
    }
  }

  // 恢复默认按钮文字
  document.getElementById('btn-red').textContent = '红';
  document.getElementById('btn-blue').textContent = '蓝';
  document.getElementById('btn-green').textContent = '绿';
  document.getElementById('btn-yellow').textContent = '黄';
}

function spawnBalloon(forceSide) {
  let side, y;

  const s = getLevelStrategy();
  if (s && s.spawnBalloon) {
    if (s.spawnBalloon(forceSide)) return;
  }

  side = Math.random() < 0.5 ? -1 : 1;

  // 根据关卡配置决定颜色数量
  const lvl = findLevel(currentLevelId);
  const numColors = lvl ? lvl.colors : 2;
  let color;
  if (numColors >= 4) {
    // 四色关卡
    const rand = Math.random();
    if (rand < 0.25) color = RED;
    else if (rand < 0.5) color = BLUE;
    else if (rand < 0.75) color = GREEN;
    else color = YELLOW;
  } else if (numColors >= 3) {
    // 三色关卡
    const rand = Math.random();
    if (rand < 0.33) color = RED;
    else if (rand < 0.66) color = BLUE;
    else color = GREEN;
  } else {
    // 双色关卡
    color = Math.random() < 0.5 ? RED : BLUE;
  }

  // 合体气球：combo关卡有概率生成
  let comboColors = null;
  if (lvl && lvl.combo && Math.random() < 0.3) {
    if (lvl.comboMulti) {
      // 随机2/3/4色合体
      const allColors = [RED, BLUE, GREEN, YELLOW];
      const count = 2 + Math.floor(Math.random() * 3); // 2, 3, 或 4
      const shuffled = allColors.sort(() => Math.random() - 0.5);
      comboColors = shuffled.slice(0, count);
    } else if (currentLevelId === 13) {
      // 四色合体：从4色中随机选2个
      const allColors = [RED, BLUE, GREEN, YELLOW];
      const shuffled = allColors.sort(() => Math.random() - 0.5);
      comboColors = [shuffled[0], shuffled[1]];
    } else {
      // 关卡9/10/11等：红蓝合体
      comboColors = [RED, BLUE];
    }
  }

  // 第19关：内外颜色不同
  let innerColor = null;
  if (lvl && lvl.dualColor) {
    // 内层颜色与外层不同
    const availableColors = numColors >= 3 ? [RED, BLUE, GREEN] : [RED, BLUE];
    const otherColors = availableColors.filter(c => c !== color);
    innerColor = otherColors[Math.floor(Math.random() * otherColors.length)];
  }

  // 第21关：反向合体，按其他三种颜色才能射爆（拼色气球）
  if (lvl && lvl.reverseCombo && !comboColors) {
    const allColors = [RED, BLUE, GREEN, YELLOW];
    comboColors = allColors.filter(c => c !== color);
  }

  // 第22关：声东击西，按其他三种颜色射爆（单色气球视觉）
  let shootColors = null;
  if (lvl && lvl.reverseShoot) {
    const allColors = [RED, BLUE, GREEN, YELLOW];
    shootColors = allColors.filter(c => c !== color);
  }

  balloons.push({
    x: side * (TREE_W / 2 + 30 + Math.random() * 15),
    y: nextBalloonY,
    color, side,
    alive: true,
    targeted: false,
    wobble: Math.random() * Math.PI * 2,
    scale: 1,
    comboColors,
    innerColor,
    shootColors
  });
  nextBalloonY -= BALLOON_GAP;
}

function getTargetBalloon(side, color) {
  let alive = balloons.filter(b => b.alive && !b.targeted);
  if (side !== undefined) {
    alive = alive.filter(b => b.side === side);
  }
  // 自动跳过炸弹气球（射击下一个非炸弹气球）
  alive = alive.filter(b => !b.bomb);
  if (alive.length === 0) return null;
  return alive.reduce((a, b) => a.y > b.y ? a : b);
}

function worldToScreen(wx, wy) {
  return {
    x: W / 2 + wx,
    y: H / 2 + (wy - cameraY)
  };
}

// 辅助函数：创建箭矢或闪电特效（闪电主题即时命中，其他主题创建箭矢）
function shootArrowOrLightning(target, color, startX, startY, angle, isWrong, options = {}) {
  const isLightningTheme = currentThemes.arrow === 'arrow_lightning_bolt';
  if (isLightningTheme) {
    const targetScreenPos = worldToScreen(target.x, target.y);
    createLightningEffect(targetScreenPos.x, targetScreenPos.y, color, target.side);
    if (isWrong) {
      const lvl = findLevel(currentLevelId);
      if (options.timePenalty) {
        target.targeted = false;
      } else {
        setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
      }
    } else if (options.shieldBreak) {
      target.targeted = false;
    } else if (options.forceDestroy) {
      hitBalloon(target, angle);
    } else {
      hitBalloon(target, angle);
    }
  } else {
    arrows.push({
      x: startX, y: startY,
      targetX: target.x, targetY: target.y,
      angle, speed: 70, color, target,
      alive: true, wrong: !!isWrong,
      shieldBreak: !!options.shieldBreak,
      forceDestroy: !!options.forceDestroy,
      timePenalty: !!options.timePenalty
    });
  }
}

function shoot(color, side) {
  if (state !== 'playing') return;

  const lvl = findLevel(currentLevelId);

  // 双人对战+双拼关卡：使用分边combo变量
  const useSplitCombo = versusMode && lvl && lvl.comboTimeout;
  let myPending = pendingComboColors;
  let myComboTarget = comboTarget;
  let myComboTimer = comboTimer;
  let setMyPending = (v) => { pendingComboColors = v; };
  let setMyComboTarget = (v) => { comboTarget = v; };
  let setMyComboTimer = (v) => { comboTimer = v; };

  if (useSplitCombo) {
    if (side === -1) {
      myPending = pendingComboLeft;
      myComboTarget = comboTargetLeft;
      myComboTimer = comboTimerLeft;
      setMyPending = (v) => { pendingComboLeft = v; };
      setMyComboTarget = (v) => { comboTargetLeft = v; };
      setMyComboTimer = (v) => { comboTimerLeft = v; };
    } else {
      myPending = pendingComboRight;
      myComboTarget = comboTargetRight;
      myComboTimer = comboTimerRight;
      setMyPending = (v) => { pendingComboRight = v; };
      setMyComboTarget = (v) => { comboTargetRight = v; };
      setMyComboTimer = (v) => { comboTimerRight = v; };
    }
  }

  // 如果正在combo中，直接使用comboTarget
  // 如果正在配对中，直接使用pairPending的target
  let target;
  const myPairPending = useSplitCombo ? (side === -1 ? pairPendingLeft : pairPendingRight) : null;
  if (myPairPending) {
    target = myPairPending.target;
  } else if (myComboTarget && myPending.length > 0) {
    target = myComboTarget;
  } else {
    target = getTargetBalloon(side, color);
  }
  if (!target) return;

  // 第26关：炸弹气球射中=该方输（双雕第二支箭可能选中炸弹）
  if (target.bomb) {
    versusLoser = (side === -1) ? 'left' : 'right';
    state = 'dying';
    target.targeted = true;
    const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
    const startY = target.y + 40;
    shootArrowOrLightning(target, 0, startX, startY, Math.atan2(target.y - startY, target.x - startX), true);
    return;
  }

  // 第26关：护盾气球第一次射击破盾
  if (target.shield && target.shieldHP > 1 && !target.shieldBroken) {
    target.shieldHP--;
    target.shieldBroken = true;
    target.targeted = true;
    // 破盾动画
    createShieldBreakEffect(target.x, target.y);
    // 箭射出但只破盾
    const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
    const startY = target.y + 40;
    const dx = target.x - startX;
    const dy = target.y - startY;
    const angle = Math.atan2(dy, dx);
    shootArrowOrLightning(target, color, startX, startY, angle, false, { shieldBreak: true });
    if (versusMode) {
      // 破盾不计分
    }
    if (countdownMode === 1) {
      countdown = countdownMax;
    }
    return;
  }

  // 合体气球combo机制（支持分边combo）
  if (target.comboColors && target.comboColors.length > 1) {
    if (myComboTarget && myComboTarget !== target) {
      setMyPending([]);
      if (myComboTimer) { clearTimeout(myComboTimer); setMyComboTimer(null); }
      myComboTarget.targeted = false;
      setMyComboTarget(null);
    }

    if (!target.comboColors.includes(color)) {
      if (versusMode) versusLoser = (side === -1) ? 'left' : 'right';
      state = 'dying';
      target.targeted = true;
      if (myComboTimer) { clearTimeout(myComboTimer); setMyComboTimer(null); }
      setMyComboTarget(null);
      setMyPending([]);
      const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
      const startY = target.y + 40;
      shootArrowOrLightning(target, color, startX, startY, Math.atan2(target.y - startY, target.x - startX), true);
      return;
    }

    myPending.push(color);

    if (myPending.length === 1) {
      target.targeted = true;
      setMyComboTarget(target);
      const comboTimeout = (findLevel(currentLevelId) || {}).comboTimeout || 300;
      if (myComboTimer) clearTimeout(myComboTimer);
      const savedSide = side;
      const timer = setTimeout(() => {
        const ct = useSplitCombo ? (savedSide === -1 ? comboTargetLeft : comboTargetRight) : comboTarget;
        const cp = useSplitCombo ? (savedSide === -1 ? pendingComboLeft : pendingComboRight) : pendingComboColors;
        if (state === 'playing' && ct && cp.length < ct.comboColors.length) {
          if (versusMode) versusLoser = (savedSide === -1) ? 'left' : 'right';
          state = 'dying';
          const startX = ct.x < 0 ? -W / 2 - 50 : W / 2 + 50;
          const startY = ct.y + 40;
          shootArrowOrLightning(ct, cp[0], startX, startY, Math.atan2(ct.y - startY, ct.x - startX), true);
        }
        if (useSplitCombo) {
          if (savedSide === -1) { pendingComboLeft = []; comboTargetLeft = null; comboTimerLeft = null; }
          else { pendingComboRight = []; comboTargetRight = null; comboTimerRight = null; }
        } else { pendingComboColors = []; comboTarget = null; comboTimer = null; }
      }, comboTimeout);
      if (useSplitCombo) { if (side === -1) comboTimerLeft = timer; else comboTimerRight = timer; }
      else comboTimer = timer;
      return;
    }

    if (myPending.length >= 2) {
      const curTarget = useSplitCombo ? (side === -1 ? comboTargetLeft : comboTargetRight) : comboTarget;
      const allPressed = curTarget.comboColors.every(c => myPending.includes(c));
      if (myComboTimer) { clearTimeout(myComboTimer); }
      if (useSplitCombo) { if (side === -1) comboTimerLeft = null; else comboTimerRight = null; }
      else comboTimer = null;

      if (!allPressed) {
        const comboTimeout = (findLevel(currentLevelId) || {}).comboTimeout || 300;
        const savedSide2 = side;
        const timer2 = setTimeout(() => {
          const ct = useSplitCombo ? (savedSide2 === -1 ? comboTargetLeft : comboTargetRight) : comboTarget;
          const cp = useSplitCombo ? (savedSide2 === -1 ? pendingComboLeft : pendingComboRight) : pendingComboColors;
          if (state === 'playing' && ct && cp.length < ct.comboColors.length) {
            if (versusMode) versusLoser = (savedSide2 === -1) ? 'left' : 'right';
            state = 'dying';
            const startX = ct.x < 0 ? -W / 2 - 50 : W / 2 + 50;
            const startY = ct.y + 40;
            shootArrowOrLightning(ct, cp[0], startX, startY, Math.atan2(ct.y - startY, ct.x - startX), true);
          }
          if (useSplitCombo) {
            if (savedSide2 === -1) { pendingComboLeft = []; comboTargetLeft = null; comboTimerLeft = null; }
            else { pendingComboRight = []; comboTargetRight = null; comboTimerRight = null; }
          } else { pendingComboColors = []; comboTarget = null; comboTimer = null; }
        }, comboTimeout);
        if (useSplitCombo) { if (side === -1) comboTimerLeft = timer2; else comboTimerRight = timer2; }
        else comboTimer = timer2;
        return;
      }

      setMyPending([]);
      target = curTarget;
      setMyComboTarget(null);
      if (countdownMode === 1) countdown = countdownMax;
    }
  }

  // 配对气球：顺序按键机制（先按左颜色，再按右颜色）
  if (target.pairColors && target.pairColors.length === 2 && !target.comboColors) {
    const myPP = useSplitCombo ? (side === -1 ? pairPendingLeft : pairPendingRight) : null;
    const setPairPending = useSplitCombo ? (side === -1 ? (v) => { pairPendingLeft = v; } : (v) => { pairPendingRight = v; }) : null;
    const setPairTimer = useSplitCombo ? (side === -1 ? (v) => { pairTimerLeft = v; } : (v) => { pairTimerRight = v; }) : null;
    const now = performance.now();

    if (!myPP) {
      // 第一次按键：必须匹配pairColors[0]（左气球颜色）
      if (color !== target.pairColors[0]) {
        // 按错颜色→输
        if (versusMode) versusLoser = (side === -1) ? 'left' : 'right';
        state = 'dying';
        target.targeted = true;
        const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
        const startY = target.y + 40;
        shootArrowOrLightning(target, color, startX, startY, Math.atan2(target.y - startY, target.x - startX), true);
        return;
      }
      // 正确的第一按→设置pending，启动超时计时器
      target.targeted = true;
      setPairPending({ color, time: now, target });
      const savedSide = side;
      const timer = setTimeout(() => {
        const pp = savedSide === -1 ? pairPendingLeft : pairPendingRight;
        if (state === 'playing' && pp && pp.target.alive) {
          // 超时→只按了一个键→输
          if (versusMode) versusLoser = (savedSide === -1) ? 'left' : 'right';
          state = 'dying';
          const t2 = pp.target;
          const sx = t2.x < 0 ? -W / 2 - 50 : W / 2 + 50;
          const sy = t2.y + 40;
          shootArrowOrLightning(t2, pp.color, sx, sy, Math.atan2(t2.y - sy, t2.x - sx), true);
        }
        if (savedSide === -1) { pairPendingLeft = null; pairTimerLeft = null; }
        else { pairPendingRight = null; pairTimerRight = null; }
      }, 500);
      setPairTimer(timer);
      return;
    } else {
      // 第二次按键
      if (setPairTimer) { const t = side === -1 ? pairTimerLeft : pairTimerRight; if (t) clearTimeout(t); setPairTimer(null); }

      const timeDiff = now - myPP.time;

      // 检测是否同时按下（间隔太短→视为同时按→输）
      if (timeDiff < 50) {
        if (versusMode) versusLoser = (side === -1) ? 'left' : 'right';
        state = 'dying';
        target.targeted = true;
        const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
        const startY = target.y + 40;
        shootArrowOrLightning(target, color, startX, startY, Math.atan2(target.y - startY, target.x - startX), true);
        setPairPending(null);
        return;
      }

      // 检查第二按颜色是否匹配pairColors[1]（右气球颜色）
      if (color !== target.pairColors[1]) {
        // 按错颜色→输
        if (versusMode) versusLoser = (side === -1) ? 'left' : 'right';
        state = 'dying';
        target.targeted = true;
        const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
        const startY = target.y + 40;
        shootArrowOrLightning(target, color, startX, startY, Math.atan2(target.y - startY, target.x - startX), true);
        setPairPending(null);
        return;
      }

      // 正确的顺序按键→清除pending，继续正常射击逻辑
      setPairPending(null);
      if (countdownMode === 1) countdown = countdownMax;
    }
  }

  // 声东击西机制：单色气球，按其他三种颜色射爆
  if (target.shootColors && target.shootColors.length > 1 && !target.comboColors) {
    // 如果已有combo目标且不是当前目标，说明切换了目标，重置
    if (comboTarget && comboTarget !== target) {
      pendingComboColors = [];
      if (comboTimer) { clearTimeout(comboTimer); comboTimer = null; }
      comboTarget.targeted = false;
      comboTarget = null;
    }

    // 检查按下的颜色是否在射击颜色中
    if (!target.shootColors.includes(color)) {
      // 按错颜色（按了气球自身颜色或其他不在shootColors中的颜色），直接game over
      state = 'dying';
      target.targeted = true;
      if (comboTimer) { clearTimeout(comboTimer); comboTimer = null; }
      comboTarget = null;
      pendingComboColors = [];
      const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
      const startY = target.y + 40;
      const dx = target.x - startX;
      const dy = target.y - startY;
      const angle = Math.atan2(dy, dx);
      shootArrowOrLightning(target, color, startX, startY, angle, true);
      return;
    }

    // 记录按下的颜色
    pendingComboColors.push(color);

    if (pendingComboColors.length === 1) {
      // 第一次按下，标记目标并保存，启动计时器
      target.targeted = true;
      comboTarget = target;
      const comboTimeout = (findLevel(currentLevelId) || {}).comboTimeout || 300;
      if (comboTimer) clearTimeout(comboTimer);
      comboTimer = setTimeout(() => {
        if (state === 'playing' && pendingComboColors.length < comboTarget.shootColors.length && comboTarget) {
          state = 'dying';
          const t2 = comboTarget;
          const startX = t2.x < 0 ? -W / 2 - 50 : W / 2 + 50;
          const startY = t2.y + 40;
          const dx = t2.x - startX;
          const dy = t2.y - startY;
          const angle = Math.atan2(dy, dx);
          shootArrowOrLightning(t2, pendingComboColors[0], startX, startY, angle, true);
        }
        pendingComboColors = [];
        comboTarget = null;
        comboTimer = null;
      }, comboTimeout);
      return;
    }

    if (pendingComboColors.length >= 2) {
      const allPressed = comboTarget.shootColors.every(c => pendingComboColors.includes(c));
      if (comboTimer) { clearTimeout(comboTimer); comboTimer = null; }

      if (!allPressed) {
        comboTimer = setTimeout(() => {
          if (state === 'playing' && pendingComboColors.length < comboTarget.shootColors.length && comboTarget) {
            state = 'dying';
            const t2 = comboTarget;
            const startX = t2.x < 0 ? -W / 2 - 50 : W / 2 + 50;
            const startY = t2.y + 40;
            const dx = t2.x - startX;
            const dy = t2.y - startY;
            const angle = Math.atan2(dy, dx);
            shootArrowOrLightning(t2, pendingComboColors[0], startX, startY, angle, true);
          }
          pendingComboColors = [];
          comboTarget = null;
          comboTimer = null;
        }, (findLevel(currentLevelId) || {}).comboTimeout || 300);
        return;
      }

      pendingComboColors = [];
      target = comboTarget;
      comboTarget = null;
      if (countdownMode === 1) {
        countdown = countdownMax;
      }
    }
  }

  // 普通气球：判断是否射错
  // 合体气球完成combo后不需要判断颜色匹配（第21关按的是其他颜色）
  // 第19关：按内层颜色匹配
  const matchTargetColor = (currentLevelId === 19 && target.innerColor) ? target.innerColor : target.color;
  const isWrong = (!target.comboColors || target.comboColors.length <= 1) && (!target.shootColors || target.shootColors.length <= 1) && (!target.pairColors || target.pairColors.length <= 1) ? (matchTargetColor !== color) : false;
  if (versusMode) {
    if (isWrong) {
      versusLoser = (side === -1) ? 'left' : 'right';
      state = 'dying';
    } else {
      if (side === -1) leftScore++;
      else rightScore++;
      score = leftScore + rightScore;
      if (countdownMode === 1) {
        countdown = countdownMax;
      }
      if (countdownMode === 2) {
        countdown += 0.2; // 射对+0.2秒
      }
    }
  } else {
    if (isWrong) {
      if (countdownMode === 2 && lvl && lvl.countdown === 'total' && lvl.totalTime === 30) {
        // 30秒倒计时关卡：射错扣2秒而非直接game over
        countdown -= 2;
        if (countdown <= 0) {
          countdown = 0;
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        }
        // targeted在箭弹飞后释放（见箭命中处理）
      } else {
        state = 'dying';
      }
    } else {
      if (countdownMode === 1) {
        countdown = countdownMax;
      }
      if (countdownMode === 2) {
        countdown += 0.2; // 射对+0.2秒
      }
    }
  }

  target.targeted = true;

  // 判断是否为闪电主题
  const isLightningTheme = currentThemes.arrow === 'arrow_lightning_bolt';

  const startX = target.x < 0 ? -W / 2 - 50 : W / 2 + 50;
  const startY = target.y + 40;
  const dx = target.x - startX;
  const dy = target.y - startY;
  const angle = Math.atan2(dy, dx);

  // 合体气球射爆时用第一个combo颜色，声东击西用第一个shootColor，配对用第一个pairColor
  const arrowColor = (target.comboColors && target.comboColors.length > 1) ? target.comboColors[0]
    : (target.shootColors && target.shootColors.length > 1) ? target.shootColors[0]
    : (target.pairColors && target.pairColors.length > 1) ? target.pairColors[0]
    : color;
  const isWrongArrow = (!target.comboColors || target.comboColors.length <= 1) && (!target.shootColors || target.shootColors.length <= 1) && (!target.pairColors || target.pairColors.length <= 1) ? (matchTargetColor !== color) : false;

  if (isLightningTheme) {
    // 闪电主题：即时命中+闪电特效
    const targetScreenPos = worldToScreen(target.x, target.y);
    createLightningEffect(targetScreenPos.x, targetScreenPos.y, arrowColor);
    if (isWrongArrow) {
      // 错误射击
      if (isWrongArrow && countdownMode === 2 && lvl && lvl.countdown === 'total' && lvl.totalTime === 30) {
        // 30秒倒计时关卡：射错扣2秒，释放targeted
        target.targeted = false;
      } else {
        setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
      }
    } else {
      hitBalloon(target, angle);
    }
  } else {
    arrows.push({
      x: startX,
      y: startY,
      targetX: target.x,
      targetY: target.y,
      angle,
      speed: 70,
      color: arrowColor,
      target,
      alive: true,
      wrong: isWrongArrow,
      timePenalty: isWrongArrow && countdownMode === 2 && lvl && lvl.countdown === 'total' && lvl.totalTime === 30
    });
  }

  // 双雕机制：射第二支箭击爆第二个气球
  if (lvl && lvl.doubleShot && !isWrong) {
    const target2 = getTargetBalloon(side);
    if (target2) {
      // 第26关：第二目标是炸弹则不射第二支箭
      if (target2.bomb) {
        // 不射第二支箭，跳过
      } else {
        target2.targeted = true;
        if (isLightningTheme) {
          const t2ScreenPos = worldToScreen(target2.x, target2.y);
          createLightningEffect(t2ScreenPos.x, t2ScreenPos.y, target2.color, target2.side);
          hitBalloon(target2, angle);
        } else {
          const startX2 = target2.x < 0 ? -W / 2 - 50 : W / 2 + 50;
          const startY2 = target2.y + 40;
          const angle2 = Math.atan2(target2.y - startY2, target2.x - startX2);
          arrows.push({
            x: startX2, y: startY2,
            targetX: target2.x, targetY: target2.y,
            angle: angle2, speed: 70,
            color: target2.color, target: target2,
            alive: true, wrong: false,
            forceDestroy: true // 双雕强制击碎（无视护盾/双拼）
          });
        }
        // versus模式下第二支箭也需要计分
        if (versusMode) {
          if (side === -1) leftScore++;
          else rightScore++;
          score = leftScore + rightScore;
        }
      }
    }
  }

}

function hitBalloon(b, arrowAngle) {
  // 箭留在树上（插在树干表面）
  const stuckX = b.side * (TREE_W / 2 - 5);
  stuckArrows.push({
    x: stuckX,
    y: b.y,
    angle: arrowAngle,
    color: b.color,
    life: 300
  });

  b.alive = false;
  playBubblePop();
  const isCombo = b.comboColors && b.comboColors.length > 1;
  const isPair = b.pairColors && b.pairColors.length > 1;
  const mainColor = isCombo ? b.comboColors[0] : isPair ? b.pairColors[0] : b.color;
  const secondColor = isCombo ? b.comboColors[1] : isPair ? b.pairColors[1] : b.color;

  // === 爆炸闪光 ===
  explosions.push({
    x: b.x, y: b.y,
    color: COLORS_LIGHT[mainColor],
    radius: 5,
    maxRadius: 50,
    life: 1
  });
  if (isCombo || isPair) {
    explosions.push({
      x: b.x, y: b.y,
      color: COLORS_LIGHT[secondColor],
      radius: 5,
      maxRadius: 40,
      life: 0.8
    });
  }

  // === 冲击波环 ===
  explosions.push({
    x: b.x, y: b.y,
    color: COLORS[mainColor],
    radius: 10,
    maxRadius: 70,
    life: 1,
    ring: true
  });
  if (isCombo || isPair) {
    explosions.push({
      x: b.x, y: b.y,
      color: COLORS[secondColor],
      radius: 10,
      maxRadius: 55,
      life: 0.8,
      ring: true
    });
  }

  // === 真实气球爆裂碎片 ===
  const fragCount = 8 + Math.floor(Math.random() * 5); // 8-12块碎片
  for (let i = 0; i < fragCount; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 6;
    const pColor = (isCombo || isPair) ? (i % 2 === 0 ? COLORS[mainColor] : COLORS[secondColor]) : COLORS[b.color];
    // 生成不规则多边形碎片（3-5个顶点）
    const verts = [];
    const numVerts = 3 + Math.floor(Math.random() * 3);
    for (let v = 0; v < numVerts; v++) {
      const va = (v / numVerts) * Math.PI * 2 + Math.random() * 0.5;
      const vr = 3 + Math.random() * 6;
      verts.push({ x: Math.cos(va) * vr, y: Math.sin(va) * vr });
    }
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 2,
      color: pColor,
      life: 1.2,
      type: 'fragment',
      verts,
      rotation: Math.random() * Math.PI * 2,
      rotSpeed: (Math.random() - 0.5) * 0.3
    });
  }

  // === 大量爆炸粒子 ===
  // 主碎片 - 大块
  for (let i = 0; i < 18; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 2 + Math.random() * 5;
    const pColor = (isCombo || isPair) ? (i % 2 === 0 ? COLORS[mainColor] : COLORS[secondColor]) : COLORS[b.color];
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      size: 4 + Math.random() * 5,
      color: pColor,
      life: 1,
      type: 'chunk'
    });
  }
  // 亮色碎屑
  for (let i = 0; i < 12; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 3 + Math.random() * 4;
    const pColor = isCombo ? (i % 2 === 0 ? COLORS_LIGHT[mainColor] : COLORS_LIGHT[secondColor]) : COLORS_LIGHT[b.color];
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 0.5,
      size: 2 + Math.random() * 3,
      color: pColor,
      life: 0.8,
      type: 'spark'
    });
  }
  // 细小火花 - 飞散快
  for (let i = 0; i < 10; i++) {
    const angle = Math.random() * Math.PI * 2;
    const spd = 5 + Math.random() * 6;
    particles.push({
      x: b.x, y: b.y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1.5,
      size: 1.5 + Math.random() * 2,
      color: '#fff',
      life: 0.6,
      type: 'spark'
    });
  }

  if (versusMode) {
    score = leftScore + rightScore;
  } else {
    score += 1;
  }
  scoreScale = 1.2;
  scoreScaleTimer = 0.15;
  const ftColor = (b.comboColors && b.comboColors.length > 1) ? COLORS[b.comboColors[0]] : (b.pairColors && b.pairColors.length > 1) ? COLORS[b.pairColors[0]] : COLORS[b.color];
  addFloatText(b.x, b.y - 25, '+1', ftColor, 28);
}

function addFloatText(x, y, text, color, size) {
  floatTexts.push({ x, y, text, color, size, life: 1, vy: -1 });
}

function gameOver() {
  const finalScore = score;

  // 最高分保存（每关独立）
  if (finalScore > getBestScore(currentLevelId)) {
    bestScores[currentLevelId] = finalScore;
    localStorage.setItem('arrow_bestScores', JSON.stringify(bestScores));
  }

  // 通关进度保存：得分超过30分视为通关
  if (finalScore >= 30 && currentLevelId >= maxUnlockedLevel) {
    maxUnlockedLevel = Math.min(currentLevelId + 1, 28);
    localStorage.setItem('arrow_maxLevel', maxUnlockedLevel.toString());
    updateLevelDataUnlocked();
  }

  state = 'gameover';
  stopBgm();
  countdownMode = 0;
  versusEndAnimTime = Date.now();

  // 游戏结束后隐藏云朵
  cloudEnabled = false;

  if (versusMode) {
    // 对战模式弹窗
    const popup = document.getElementById('gameover-popup');
    popup.querySelector('h2').textContent = versusLoser === 'draw' ? '平局' : '对战结束';
    document.getElementById('final-score').style.display = 'none';
    document.getElementById('final-info').style.display = 'none';

    const versusResult = document.getElementById('versus-result');
    versusResult.style.display = 'block';

    const leftWin = versusLoser === 'right';
    const rightWin = versusLoser === 'left';

    document.getElementById('versus-left').innerHTML =
      `<div style="color:#fff; font-size:18px; font-weight:bold; margin-bottom:6px;">左方</div>` +
      `<div style="color:#FFD700; font-size:24px; font-weight:bold; margin-bottom:4px;">${leftScore}</div>` +
      (leftWin ? `<div style="color:#4CAF50; font-size:16px; font-weight:bold;">胜利</div>` : '');

    document.getElementById('versus-right').innerHTML =
      `<div style="color:#fff; font-size:18px; font-weight:bold; margin-bottom:6px;">右方</div>` +
      `<div style="color:#FFD700; font-size:24px; font-weight:bold; margin-bottom:4px;">${rightScore}</div>` +
      (rightWin ? `<div style="color:#4CAF50; font-size:16px; font-weight:bold;">胜利</div>` : '');

    if (versusLoser === 'draw') {
      document.getElementById('versus-left').innerHTML +=
        `<div style="color:#FF9800; font-size:14px; margin-top:4px;">平局</div>`;
      document.getElementById('versus-right').innerHTML +=
        `<div style="color:#FF9800; font-size:14px; margin-top:4px;">平局</div>`;
    }
  } else {
    // 普通模式弹窗
    document.getElementById('final-score').style.display = '';
    document.getElementById('final-info').style.display = '';
    document.getElementById('versus-result').style.display = 'none';
    document.getElementById('gameover-popup').querySelector('h2').textContent = '游戏结束';
    document.getElementById('final-score').textContent = '当前得分: ' + finalScore;
    document.getElementById('final-info').textContent = '最高分: ' + getBestScore(currentLevelId);
  }

  document.getElementById('gameover-popup').style.display = 'none';
  showStartUI(false);

  // 0.5秒后同时显示弹窗和点击开始
  canRestartTime = Date.now() + 500;
  setTimeout(() => {
    if (state === 'gameover') {
      document.getElementById('gameover-popup').style.display = 'block';
      showStartUI(true);
    }
  }, 500);
}

// ==================== 绘制 ====================

function drawBackground() {
  const bg = currentThemes.bg;
  const heightK = Math.abs(cameraY) / 5000;

  (bgRenderers[bg] || bgRenderers['bg_deepspace'])(heightK);
}

// ==================== 背景注册表 ====================
const bgRenderers = {
  bg_sunset(heightK) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#1a0533');
    grad.addColorStop(0.3, '#6b1d5e');
    grad.addColorStop(0.5, '#d4553b');
    grad.addColorStop(0.7, '#f4a039');
    grad.addColorStop(1, '#fcd668');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // 太阳
    ctx.save();
    const sunGrad = ctx.createRadialGradient(W * 0.5, H * 0.65, 5, W * 0.5, H * 0.65, 60);
    sunGrad.addColorStop(0, 'rgba(255,220,100,0.9)');
    sunGrad.addColorStop(0.5, 'rgba(255,160,50,0.4)');
    sunGrad.addColorStop(1, 'rgba(255,100,30,0)');
    ctx.fillStyle = sunGrad;
    ctx.beginPath();
    ctx.arc(W * 0.5, H * 0.65, 60, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  },

  bg_sakura(heightK) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#4a2040');
    grad.addColorStop(0.4, '#8a4070');
    grad.addColorStop(0.7, '#d490b0');
    grad.addColorStop(1, '#f0c0d0');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // 飘落花瓣
    const t = Date.now() / 1000;
    ctx.fillStyle = 'rgba(255,200,210,0.7)';
    for (let i = 0; i < 20; i++) {
      const px = ((i * 3571 + t * 20 * (0.5 + i * 0.05)) % (W + 40)) - 20;
      const py = ((i * 5113 + t * 30 * (0.3 + i * 0.04)) % (H + 40)) - 20;
      const rot = t * (0.5 + i * 0.2);
      ctx.save();
      ctx.translate(px, py);
      ctx.rotate(rot);
      ctx.beginPath();
      ctx.ellipse(0, 0, 4, 2.5, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }
  },

  bg_deepspace(heightK) {
    const grad = ctx.createLinearGradient(0, 0, 0, H);
    grad.addColorStop(0, '#020210');
    grad.addColorStop(0.5, '#050518');
    grad.addColorStop(1, '#030312');
    ctx.fillStyle = grad;
    ctx.fillRect(0, 0, W, H);
    // 星云
    ctx.save();
    const neb1 = ctx.createRadialGradient(W * 0.3, H * 0.4, 10, W * 0.3, H * 0.4, 120);
    neb1.addColorStop(0, 'rgba(60,20,100,0.15)');
    neb1.addColorStop(0.5, 'rgba(30,10,80,0.08)');
    neb1.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = neb1;
    ctx.fillRect(0, 0, W, H);
    const neb2 = ctx.createRadialGradient(W * 0.75, H * 0.6, 10, W * 0.75, H * 0.6, 100);
    neb2.addColorStop(0, 'rgba(20,40,100,0.12)');
    neb2.addColorStop(0.5, 'rgba(10,20,60,0.06)');
    neb2.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = neb2;
    ctx.fillRect(0, 0, W, H);
    ctx.restore();
    // 密集星星
    drawStars(120, 0.5, 0.4, 0.3, 0.3);
    // 远处星系
    ctx.save();
    const gal = ctx.createRadialGradient(W * 0.15, H * 0.2, 2, W * 0.15, H * 0.2, 30);
    gal.addColorStop(0, 'rgba(200,180,255,0.3)');
    gal.addColorStop(0.3, 'rgba(150,130,200,0.1)');
    gal.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = gal;
    ctx.beginPath();
    ctx.ellipse(W * 0.15, H * 0.2, 30, 12, 0.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
};

function drawTree() {
  const cx = W / 2;
  const hw = TREE_W / 2;

  // 树干主体 - 圆角矩形
  const trunkGrad = ctx.createLinearGradient(cx - hw, 0, cx + hw, 0);
  trunkGrad.addColorStop(0, '#3E2723');
  trunkGrad.addColorStop(0.15, '#5D4037');
  trunkGrad.addColorStop(0.35, '#6D4C41');
  trunkGrad.addColorStop(0.5, '#795548');
  trunkGrad.addColorStop(0.65, '#6D4C41');
  trunkGrad.addColorStop(0.85, '#5D4037');
  trunkGrad.addColorStop(1, '#3E2723');
  ctx.fillStyle = trunkGrad;
  ctx.beginPath();
  ctx.moveTo(cx - hw + 3, 0);
  ctx.lineTo(cx + hw - 3, 0);
  ctx.arcTo(cx + hw, 0, cx + hw, 3, 3);
  ctx.lineTo(cx + hw, H);
  ctx.lineTo(cx - hw, H);
  ctx.lineTo(cx - hw, 3);
  ctx.arcTo(cx - hw, 0, cx - hw + 3, 0, 3);
  ctx.closePath();
  ctx.fill();

  // 计算当前可见的世界Y范围，用于绘制随镜头移动的纹理
  const worldTop = cameraY + H / 2;
  const worldBottom = cameraY - H / 2;

  // 树皮纹理 - 竖向木纹（世界坐标，随镜头平滑移动）
  ctx.strokeStyle = 'rgba(0,0,0,0.12)';
  ctx.lineWidth = 1;
  for (let i = -3; i <= 3; i++) {
    const lx = cx + i * 5;
    ctx.beginPath();
    let started = false;
    for (let wy = Math.floor(worldBottom / 4) * 4; wy <= worldTop; wy += 4) {
      const sy = H / 2 + (wy - cameraY);
      const wx = Math.sin((wy + i * 50) * 0.05) * 2;
      if (!started) { ctx.moveTo(lx + wx, sy); started = true; }
      else ctx.lineTo(lx + wx, sy);
    }
    ctx.stroke();
  }

  // 树皮裂缝（世界坐标）
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 1.5;
  const crackStart = Math.floor(worldBottom / 60) * 60;
  for (let wy = crackStart; wy <= worldTop; wy += 60) {
    const sy = H / 2 + (wy - cameraY);
    const crackX = cx + ((Math.abs(wy * 7 + 13)) % 20 - 10);
    const crackW = 6 + ((Math.abs(wy * 3)) % 8);
    ctx.beginPath();
    ctx.moveTo(crackX - crackW / 2, sy);
    ctx.quadraticCurveTo(crackX, sy + 3, crackX + crackW / 2, sy + 1);
    ctx.stroke();
  }

  // 树结（世界坐标）
  const knotStart = Math.floor(worldBottom / 180) * 180 + 30;
  for (let wy = knotStart; wy <= worldTop; wy += 180) {
    const sy = H / 2 + (wy - cameraY);
    const kx = cx + ((Math.abs(wy * 11 + 7)) % 14 - 7);
    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(kx, sy, 6, 4, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(160,120,80,0.4)';
    ctx.beginPath();
    ctx.ellipse(kx - 1, sy - 1, 4, 2.5, 0.2, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = 'rgba(60,40,20,0.5)';
    ctx.beginPath();
    ctx.ellipse(kx, sy, 2.5, 1.5, 0.2, 0, Math.PI * 2);
    ctx.fill();
  }

  // 高光条 - 固定在屏幕上
  ctx.fillStyle = 'rgba(255,255,255,0.06)';
  ctx.fillRect(cx + 2, 0, 8, H);

  // 苔藓斑点（世界坐标）
  ctx.fillStyle = 'rgba(76,175,80,0.15)';
  const mossStart = Math.floor(worldBottom / 90) * 90;
  for (let wy = mossStart; wy <= worldTop; wy += 90) {
    const sy = H / 2 + (wy - cameraY);
    const mx = cx - hw + 4 + ((Math.abs(wy * 17)) % 10);
    ctx.beginPath();
    ctx.ellipse(mx, sy, 4 + (Math.abs(wy) % 3), 2 + (Math.abs(wy) % 2), 0.3, 0, Math.PI * 2);
    ctx.fill();
  }

  // 树干边缘描边 - 固定在屏幕上
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(cx - hw, 0);
  ctx.lineTo(cx - hw, H);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(cx + hw, 0);
  ctx.lineTo(cx + hw, H);
  ctx.stroke();
}

function drawBalloon(b) {
  if (!b.alive) return;
  const pos = worldToScreen(b.x, b.y);
  const t = performance.now() / 1000;
  const wobbleX = Math.sin(b.wobble + t * 3) * 4;
  const bx = pos.x + wobbleX;
  const by = pos.y;
  const s = b.scale !== undefined ? b.scale : 1;
  const r = 22 * s * (b.comboColors && b.comboColors.length > 1 ? 1.15 : 1);

  if (by < -60 || by > H + 60) return;
  if (r < 1) return; // 太小不画

  // 云层遮挡：云朵固定在屏幕上，被云挡住的气球降低透明度
  let inCloud = false;
  if (cloudEnabled) {
    const cloudScreenY = H * 0.45;
    const halfThick = cloudThickness / 2;
    if (by >= cloudScreenY - halfThick && by <= cloudScreenY + halfThick && (bx < cloudOffsetLeft + W / 2 || bx > W / 2 + cloudOffsetRight)) {
      inCloud = true;
    }
  }
  if (inCloud) ctx.globalAlpha = 0.2;

  // 绳子和阴影（配对气球自己绘制）
  const isPairBalloon = b.pairColors && b.pairColors.length === 2 && !b.comboColors;
  if (!isPairBalloon) {
    const treeEdgeX = W / 2 + b.side * TREE_W / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(treeEdgeX, by + 10);
    ctx.quadraticCurveTo((treeEdgeX + bx) / 2, by + 25, bx - b.side * 5, by + r);
    ctx.stroke();

    ctx.fillStyle = 'rgba(0,0,0,0.2)';
    ctx.beginPath();
    ctx.ellipse(bx + 2, by + 2, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.fill();
  }

  // 炸弹气球：黑色圆球炸弹形状
  if (b.bomb) {
    // 炸弹主体（黑色圆球）
    const bombGrad = ctx.createRadialGradient(bx - r * 0.25, by - r * 0.25, r * 0.1, bx, by, r);
    bombGrad.addColorStop(0, '#555');
    bombGrad.addColorStop(0.4, '#333');
    bombGrad.addColorStop(1, '#111');
    ctx.fillStyle = bombGrad;
    ctx.beginPath();
    ctx.arc(bx, by, r * 0.9, 0, Math.PI * 2);
    ctx.fill();

    // 炸弹高光
    ctx.fillStyle = 'rgba(255,255,255,0.25)';
    ctx.beginPath();
    ctx.ellipse(bx - r * 0.25, by - r * 0.3, r * 0.2, r * 0.15, -0.4, 0, Math.PI * 2);
    ctx.fill();

    // 引线（从顶部伸出的弯曲线条）
    ctx.strokeStyle = '#8B6914';
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(bx, by - r * 0.9);
    ctx.quadraticCurveTo(bx + r * 0.4, by - r * 1.3, bx + r * 0.2, by - r * 1.5);
    ctx.stroke();

    // 引线末端的火花
    const sparkT = performance.now() / 100;
    const sparkX = bx + r * 0.2;
    const sparkY = by - r * 1.5;
    ctx.fillStyle = `rgba(255, ${150 + Math.sin(sparkT) * 100}, 0, ${0.7 + Math.sin(sparkT * 2) * 0.3})`;
    ctx.beginPath();
    ctx.arc(sparkX, sparkY, 3 + Math.sin(sparkT) * 2, 0, Math.PI * 2);
    ctx.fill();
    // 火花光芒
    ctx.strokeStyle = `rgba(255, 200, 0, ${0.3 + Math.sin(sparkT * 3) * 0.2})`;
    ctx.lineWidth = 1;
    for (let i = 0; i < 4; i++) {
      const a = (i / 4) * Math.PI * 2 + sparkT;
      ctx.beginPath();
      ctx.moveTo(sparkX, sparkY);
      ctx.lineTo(sparkX + Math.cos(a) * 6, sparkY + Math.sin(a) * 6);
      ctx.stroke();
    }

    // 骷髅标记
    ctx.fillStyle = 'rgba(255,255,255,0.6)';
    ctx.font = `${r * 0.7}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('💣', bx, by + 1);

    // 已跳过的炸弹半透明
    if (skippedBombs.has(balloons.indexOf(b))) {
      ctx.globalAlpha = 0.3;
    }
    if (inCloud) ctx.globalAlpha = 1;
    return; // 炸弹气球不画普通气球逻辑
  }

  // 配对气球绘制：两个并排的小气球
  if (b.pairColors && b.pairColors.length === 2 && !b.comboColors) {
    const pr = 18 * s; // 配对气球稍小
    const offset = 22 * s; // 两个气球间距
    const leftX = bx - offset;
    const rightX = bx + offset;
    const leftColor = b.pairColors[0];
    const rightColor = b.pairColors[1];
    // 树左边：先按左(外层)=1，后按右(内层)=2
    // 树右边：先按右(外层)=1，后按左(内层)=2
    const leftNum = b.side === -1 ? '1' : '2';
    const rightNum = b.side === -1 ? '2' : '1';

    // 连接线（底部小弧线）
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(leftX, by + pr * 0.8);
    ctx.quadraticCurveTo(bx, by + pr * 1.4, rightX, by + pr * 0.8);
    ctx.stroke();

    // 左气球
    const grad1 = ctx.createRadialGradient(leftX - pr * 0.3, by - pr * 0.3, pr * 0.1, leftX, by, pr);
    grad1.addColorStop(0, COLORS_LIGHT[leftColor]);
    grad1.addColorStop(0.6, COLORS[leftColor]);
    grad1.addColorStop(1, COLORS_DARK[leftColor]);
    ctx.fillStyle = grad1;
    ctx.beginPath();
    ctx.ellipse(leftX, by, pr * 0.85, pr, 0, 0, Math.PI * 2);
    ctx.fill();

    // 左气球高光
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(leftX - pr * 0.2, by - pr * 0.35, pr * 0.13, pr * 0.22, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // 左气球序号
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = `bold ${pr * 0.6}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(leftNum, leftX, by + 1);

    // 右气球
    const grad2 = ctx.createRadialGradient(rightX - pr * 0.3, by - pr * 0.3, pr * 0.1, rightX, by, pr);
    grad2.addColorStop(0, COLORS_LIGHT[rightColor]);
    grad2.addColorStop(0.6, COLORS[rightColor]);
    grad2.addColorStop(1, COLORS_DARK[rightColor]);
    ctx.fillStyle = grad2;
    ctx.beginPath();
    ctx.ellipse(rightX, by, pr * 0.85, pr, 0, 0, Math.PI * 2);
    ctx.fill();

    // 右气球高光
    ctx.fillStyle = 'rgba(255,255,255,0.45)';
    ctx.beginPath();
    ctx.ellipse(rightX - pr * 0.2, by - pr * 0.35, pr * 0.13, pr * 0.22, -0.3, 0, Math.PI * 2);
    ctx.fill();

    // 右气球序号
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.font = `bold ${pr * 0.6}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(rightNum, rightX, by + 1);

    // 顺序箭头（1→2方向）
    ctx.strokeStyle = 'rgba(255,255,255,0.6)';
    ctx.lineWidth = 1.5;
    if (b.side === -1) {
      // 树左边：1(左)→2(右)，箭头向右
      ctx.beginPath();
      ctx.moveTo(leftX + pr * 0.7, by - pr * 0.6);
      ctx.lineTo(rightX - pr * 0.7, by - pr * 0.6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(rightX - pr * 0.7, by - pr * 0.6);
      ctx.lineTo(rightX - pr * 1.0, by - pr * 0.8);
      ctx.moveTo(rightX - pr * 0.7, by - pr * 0.6);
      ctx.lineTo(rightX - pr * 1.0, by - pr * 0.4);
      ctx.stroke();
    } else {
      // 树右边：1(右)→2(左)，箭头向左
      ctx.beginPath();
      ctx.moveTo(rightX - pr * 0.7, by - pr * 0.6);
      ctx.lineTo(leftX + pr * 0.7, by - pr * 0.6);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(leftX + pr * 0.7, by - pr * 0.6);
      ctx.lineTo(leftX + pr * 1.0, by - pr * 0.8);
      ctx.moveTo(leftX + pr * 0.7, by - pr * 0.6);
      ctx.lineTo(leftX + pr * 1.0, by - pr * 0.4);
      ctx.stroke();
    }

    // 绳子（从两个气球底部连到树干）
    const treeEdgeX = W / 2 + b.side * TREE_W / 2;
    ctx.strokeStyle = 'rgba(255,255,255,0.3)';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(treeEdgeX, by + 10);
    ctx.quadraticCurveTo((treeEdgeX + bx) / 2, by + 25, bx, by + pr);
    ctx.stroke();

    // 配对气球底部小三角（中间位置）
    ctx.fillStyle = COLORS_DARK[leftColor];
    ctx.beginPath();
    ctx.moveTo(bx - 3, by + pr * 0.9);
    ctx.lineTo(bx, by + pr * 1.15);
    ctx.lineTo(bx + 3, by + pr * 0.9);
    ctx.closePath();
    ctx.fill();

    if (inCloud) ctx.globalAlpha = 1;
    return; // 配对气球不画普通气球逻辑
  }

  // 合体气球绘制
  if (b.comboColors && b.comboColors.length > 1) {
    const numColors = b.comboColors.length;

    // 裁剪到气球形状
    ctx.save();
    ctx.beginPath();
    ctx.ellipse(bx, by, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.clip();

    if (numColors === 2) {
      // 2色：太极风格
      const c1 = COLORS[b.comboColors[0]];
      const c2 = COLORS[b.comboColors[1]];
      const cl1 = COLORS_LIGHT[b.comboColors[0]];
      const cl2 = COLORS_LIGHT[b.comboColors[1]];
      const cd1 = COLORS_DARK[b.comboColors[0]];
      const cd2 = COLORS_DARK[b.comboColors[1]];

      // 左半填充
      const grad1 = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.3, r * 0.1, bx, by, r);
      grad1.addColorStop(0, cl1);
      grad1.addColorStop(0.6, c1);
      grad1.addColorStop(1, cd1);
      ctx.fillStyle = grad1;
      ctx.fillRect(bx - r, by - r, r, r * 2);

      // 右半填充
      const grad2 = ctx.createRadialGradient(bx + r * 0.3, by - r * 0.3, r * 0.1, bx, by, r);
      grad2.addColorStop(0, cl2);
      grad2.addColorStop(0.6, c2);
      grad2.addColorStop(1, cd2);
      ctx.fillStyle = grad2;
      ctx.fillRect(bx, by - r, r, r * 2);

      // S形分界线
      ctx.beginPath();
      ctx.moveTo(bx, by - r);
      ctx.bezierCurveTo(bx + r * 0.4, by - r * 0.3, bx - r * 0.4, by + r * 0.3, bx, by + r);
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      ctx.stroke();

      // 太极小圆点
      ctx.fillStyle = c2;
      ctx.beginPath();
      ctx.arc(bx - r * 0.15, by - r * 0.25, r * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = c1;
      ctx.beginPath();
      ctx.arc(bx + r * 0.15, by + r * 0.25, r * 0.1, 0, Math.PI * 2);
      ctx.fill();
    } else {
      // 3色/4色：扇形分区
      for (let i = 0; i < numColors; i++) {
        const startAngle = (i / numColors) * Math.PI * 2 - Math.PI / 2;
        const endAngle = ((i + 1) / numColors) * Math.PI * 2 - Math.PI / 2;
        const midAngle = (startAngle + endAngle) / 2;

        const grad = ctx.createRadialGradient(
          bx + Math.cos(midAngle) * r * 0.3, by + Math.sin(midAngle) * r * 0.3, r * 0.1,
          bx, by, r
        );
        grad.addColorStop(0, COLORS_LIGHT[b.comboColors[i]]);
        grad.addColorStop(0.6, COLORS[b.comboColors[i]]);
        grad.addColorStop(1, COLORS_DARK[b.comboColors[i]]);
        ctx.fillStyle = grad;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.arc(bx, by, r * 1.2, startAngle, endAngle);
        ctx.closePath();
        ctx.fill();
      }

      // 分界线
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < numColors; i++) {
        const angle = (i / numColors) * Math.PI * 2 - Math.PI / 2;
        ctx.beginPath();
        ctx.moveTo(bx, by);
        ctx.lineTo(bx + Math.cos(angle) * r * 1.2, by + Math.sin(angle) * r * 1.2);
        ctx.stroke();
      }
    }

    ctx.restore();
  } else {
    // 普通气球绘制
    const grad = ctx.createRadialGradient(bx - r * 0.3, by - r * 0.3, r * 0.1, bx, by, r);
    grad.addColorStop(0, COLORS_LIGHT[b.color]);
    grad.addColorStop(0.6, COLORS[b.color]);
    grad.addColorStop(1, COLORS_DARK[b.color]);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.ellipse(bx, by, r * 0.85, r, 0, 0, Math.PI * 2);
    ctx.fill();

    // 第19关：内层颜色圆
    if (b.innerColor) {
      const innerR = r * 0.45;
      const innerGrad = ctx.createRadialGradient(bx - innerR * 0.3, by - innerR * 0.3, innerR * 0.1, bx, by, innerR);
      innerGrad.addColorStop(0, COLORS_LIGHT[b.innerColor]);
      innerGrad.addColorStop(0.6, COLORS[b.innerColor]);
      innerGrad.addColorStop(1, COLORS_DARK[b.innerColor]);
      ctx.fillStyle = innerGrad;
      ctx.beginPath();
      ctx.ellipse(bx, by, innerR * 0.85, innerR, 0, 0, Math.PI * 2);
      ctx.fill();
      // 内层边框
      ctx.strokeStyle = 'rgba(255,255,255,0.5)';
      ctx.lineWidth = 1;
      ctx.beginPath();
      ctx.ellipse(bx, by, innerR * 0.85, innerR, 0, 0, Math.PI * 2);
      ctx.stroke();
    }
  }

  // 气球底部小三角
  const triColor = (b.comboColors && b.comboColors.length > 1) ? COLORS_DARK[b.comboColors[0]] : COLORS_DARK[b.color];
  ctx.fillStyle = triColor;
  ctx.beginPath();
  ctx.moveTo(bx - 3, by + r * 0.9);
  ctx.lineTo(bx, by + r * 1.15);
  ctx.lineTo(bx + 3, by + r * 0.9);
  ctx.closePath();
  ctx.fill();

  // 高光
  ctx.fillStyle = 'rgba(255,255,255,0.45)';
  ctx.beginPath();
  ctx.ellipse(bx - r * 0.2, by - r * 0.35, r * 0.13, r * 0.22, -0.3, 0, Math.PI * 2);
  ctx.fill();

  // 护盾渲染
  if (b.shield && b.shieldHP > 0 && !b.shieldBroken) {
    const shieldR = r + 8;
    const shieldT = performance.now() / 1000;
    // 护盾光环
    ctx.save();
    ctx.strokeStyle = `rgba(100, 200, 255, ${0.5 + Math.sin(shieldT * 3) * 0.15})`;
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.arc(bx, by, shieldR, 0, Math.PI * 2);
    ctx.stroke();
    // 护盾填充
    const shieldGrad = ctx.createRadialGradient(bx, by, r * 0.5, bx, by, shieldR);
    shieldGrad.addColorStop(0, 'rgba(100, 200, 255, 0)');
    shieldGrad.addColorStop(0.7, 'rgba(100, 200, 255, 0.05)');
    shieldGrad.addColorStop(1, 'rgba(100, 200, 255, 0.15)');
    ctx.fillStyle = shieldGrad;
    ctx.beginPath();
    ctx.arc(bx, by, shieldR, 0, Math.PI * 2);
    ctx.fill();
    // 护盾闪光点
    for (let i = 0; i < 3; i++) {
      const sa = shieldT * 2 + i * Math.PI * 2 / 3;
      const sx = bx + Math.cos(sa) * shieldR;
      const sy = by + Math.sin(sa) * shieldR;
      ctx.fillStyle = `rgba(150, 220, 255, ${0.5 + Math.sin(shieldT * 4 + i) * 0.3})`;
      ctx.beginPath();
      ctx.arc(sx, sy, 2.5, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.restore();
  }

  // 被锁定的气球显示瞄准线
  if (b.targeted) {
    ctx.strokeStyle = 'rgba(255,215,0,0.6)';
    ctx.lineWidth = 2;
    ctx.setLineDash([4, 4]);
    ctx.beginPath();
    ctx.arc(bx, by, r + 8, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
  if (inCloud) ctx.globalAlpha = 1;
}

function drawTargetIndicator(target) {
  if (!target) return;
  const pos = worldToScreen(target.x, target.y);
  const t = performance.now() / 1000;
  const pulse = 1 + Math.sin(t * 6) * 0.15;

  if (target.comboColors && target.comboColors.length > 1) {
    // 合体气球：显示所有颜色的环
    for (let i = 0; i < target.comboColors.length; i++) {
      ctx.strokeStyle = COLORS[target.comboColors[i]];
      ctx.lineWidth = 3;
      ctx.setLineDash([6, 4]);
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, (30 + i * 6) * pulse, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);
    }
  } else if (target.pairColors && target.pairColors.length === 2) {
    // 配对气球：显示两个颜色的环（左1右2）
    ctx.strokeStyle = COLORS[target.pairColors[0]];
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(pos.x - 22, pos.y, 26 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.strokeStyle = COLORS[target.pairColors[1]];
    ctx.beginPath();
    ctx.arc(pos.x + 22, pos.y, 26 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  } else {
    ctx.strokeStyle = '#FFD700';
    ctx.lineWidth = 3;
    ctx.setLineDash([6, 4]);
    ctx.beginPath();
    ctx.arc(pos.x, pos.y, 30 * pulse, 0, Math.PI * 2);
    ctx.stroke();
    ctx.setLineDash([]);
  }
}

// 通用箭矢绘制（drawArrow和drawStuckArrows共用）
function drawArrowShape(color, angle, alpha) {
  const renderer = arrowRenderers[currentThemes.arrow];
  if (!renderer) return;
  ctx.save();
  ctx.rotate(angle);
  if (alpha !== undefined) ctx.globalAlpha = alpha;
  renderer(color, angle, alpha);
  ctx.restore();
}

// ==================== 箭矢注册表 ====================
const arrowRenderers = {

  arrow_classic(color, angle, alpha) {
    const c = COLORS[color], cl = COLORS_LIGHT[color], cd = COLORS_DARK[color];
    // 箭杆
    const shaftGrad = ctx.createLinearGradient(-40, -2.5, -40, 2.5);
    shaftGrad.addColorStop(0, '#A0784C'); shaftGrad.addColorStop(0.3, '#D4A56A');
    shaftGrad.addColorStop(0.5, '#C89860'); shaftGrad.addColorStop(1, '#7A5C3A');
    ctx.fillStyle = shaftGrad;
    ctx.beginPath(); ctx.moveTo(-1, -2.2); ctx.lineTo(-40, -1.8); ctx.lineTo(-40, 1.8); ctx.lineTo(-1, 2.2); ctx.closePath(); ctx.fill();
    // 装饰条
    ctx.strokeStyle = c; ctx.lineWidth = 1.2; ctx.globalAlpha = (alpha || 1) * 0.7;
    ctx.beginPath(); ctx.moveTo(-8, -1.8); ctx.lineTo(-30, -1.5); ctx.stroke();
    ctx.globalAlpha = alpha || 1;
    // 高光
    ctx.strokeStyle = 'rgba(255,255,220,0.25)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-3, -1.2); ctx.lineTo(-38, -0.8); ctx.stroke();
    // 箭头
    const headGrad = ctx.createLinearGradient(2, -7, 2, 7);
    headGrad.addColorStop(0, cl); headGrad.addColorStop(0.3, '#fff'); headGrad.addColorStop(0.5, c); headGrad.addColorStop(1, cd);
    ctx.fillStyle = headGrad;
    ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(0, -7); ctx.lineTo(3, 0); ctx.lineTo(0, 7); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(0,0,0,0.3)'; ctx.lineWidth = 0.8; ctx.stroke();
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(2, 0); ctx.stroke();
    // 金属环
    ctx.fillStyle = '#A07030'; ctx.fillRect(-1, -3, 3, 6);
    ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.5; ctx.strokeRect(-1, -3, 3, 6);
    // 羽毛
    for (let i = 0; i < 3; i++) {
      const fy = (i - 1) * 4;
      const fGrad = ctx.createLinearGradient(-40, fy - 4, -40, fy + 4);
      fGrad.addColorStop(0, cl); fGrad.addColorStop(0.5, c); fGrad.addColorStop(1, cd);
      ctx.fillStyle = fGrad;
      ctx.beginPath(); ctx.moveTo(-40, fy * 0.3); ctx.quadraticCurveTo(-48, fy - 5, -50, fy); ctx.quadraticCurveTo(-48, fy + 5, -40, fy * 0.3); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.3)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(-40, fy * 0.3); ctx.lineTo(-49, fy); ctx.stroke();
    }
    // 缠线
    ctx.strokeStyle = cd; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-39, -2.5); ctx.lineTo(-39, 2.5); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-41, -2.5); ctx.lineTo(-41, 2.5); ctx.stroke();
  },

  arrow_fire(color, angle, alpha) {
    const c = COLORS[color], t = Date.now() / 1000;
    ctx.save();
    ctx.shadowColor = c; ctx.shadowBlur = 15;
    // 火焰核心
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 12);
    coreGrad.addColorStop(0, '#fff'); coreGrad.addColorStop(0.2, '#ffcc00');
    coreGrad.addColorStop(0.5, '#ff6600'); coreGrad.addColorStop(0.8, c); coreGrad.addColorStop(1, 'rgba(136,0,0,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath(); ctx.arc(0, 0, 12, 0, Math.PI * 2); ctx.fill();
    // 火焰尖端（前进方向）
    const tipGrad = ctx.createLinearGradient(14, 0, -4, 0);
    tipGrad.addColorStop(0, '#fff'); tipGrad.addColorStop(0.3, '#ff8800'); tipGrad.addColorStop(0.7, c); tipGrad.addColorStop(1, 'rgba(136,0,0,0)');
    ctx.fillStyle = tipGrad;
    ctx.beginPath(); ctx.moveTo(14, 0); ctx.lineTo(2, -6); ctx.lineTo(4, 0); ctx.lineTo(2, 6); ctx.closePath(); ctx.fill();
    // 动态火焰粒子
    for (let i = 0; i < 8; i++) {
      const fx = -3 + Math.sin(t * 8 + i * 1.2) * 5;
      const fy = Math.cos(t * 10 + i * 0.9) * 6;
      const fs = 2 + Math.sin(t * 12 + i) * 1.5;
      ctx.fillStyle = i % 2 === 0 ? 'rgba(255,200,50,0.8)' : 'rgba(255,100,20,0.6)';
      ctx.beginPath(); ctx.arc(fx, fy, fs, 0, Math.PI * 2); ctx.fill();
    }
    // 火焰拖尾
    for (let i = 0; i < 6; i++) {
      const ex = -8 - i * 6 + Math.sin(t * 6 + i) * 3;
      const ey = Math.cos(t * 8 + i * 1.5) * 3;
      const es = 4 - i * 0.5 + Math.sin(t * 10 + i) * 1;
      ctx.fillStyle = `rgba(255,${150 - i * 25},0,${0.6 - i * 0.08})`;
      ctx.beginPath(); ctx.arc(ex, ey, es, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  },

  arrow_ice(color, angle, alpha) {
    // 箭杆 - 冰蓝半透明
    const shaftGrad = ctx.createLinearGradient(-40, -2.5, -40, 2.5);

    ctx.fillStyle = shaftGrad;

    ctx.beginPath(); ctx.moveTo(-3, -1.5); ctx.lineTo(-38, -1); ctx.stroke();
    // 冰箭头

    ctx.fillStyle = iHeadGrad;
    ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(0, -7); ctx.lineTo(3, 0); ctx.lineTo(0, 7); ctx.closePath(); ctx.fill();

    for (let i = 0; i < 3; i++) {
      const sx = -10 - i * 10;
      ctx.beginPath(); ctx.moveTo(sx, -1); ctx.lineTo(sx + 3, -2.5); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(sx, 1); ctx.lineTo(sx + 3, 2.5); ctx.stroke();
    }
    // 羽毛 - 冰晶
    for (let i = 0; i < 3; i++) {
      const fy = (i - 1) * 4;
      ctx.fillStyle = 'rgba(180,220,255,0.5)';
      ctx.beginPath(); ctx.moveTo(-40, fy * 0.3); ctx.lineTo(-50, fy - 4); ctx.lineTo(-48, fy); ctx.lineTo(-50, fy + 4); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(-40, fy * 0.3); ctx.lineTo(-49, fy); ctx.stroke();
    }
  },

  arrow_lightning(color, angle, alpha) {
    const c = COLORS[color];
    // 箭杆 - 电弧
    ctx.strokeStyle = 'rgba(180,180,255,0.8)'; ctx.lineWidth = 2;

    // 外发光

    ctx.shadowColor = c; ctx.shadowBlur = 20;
