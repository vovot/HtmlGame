      const px = -40 + Math.random() * 55;
      const py = (Math.random() - 0.5) * 16;
      ctx.fillStyle = `rgba(200,200,255,${0.2 + Math.random() * 0.6})`;
      ctx.beginPath(); ctx.arc(px, py, 0.5 + Math.random() * 2, 0, Math.PI * 2); ctx.fill();
    }
    // 末端闪光
    ctx.save();
    ctx.shadowColor = '#fff'; ctx.shadowBlur = 20;
    ctx.fillStyle = 'rgba(255,255,255,0.8)';
    ctx.beginPath(); ctx.arc(12, 0, 3 + Math.sin(t * 20) * 1.5, 0, Math.PI * 2); ctx.fill();
    ctx.restore();
  },

  arrow_air(color, angle, alpha) {
    // 空气箭 - 完全不可见
  },

  arrow_glass(color, angle, alpha) {
    // 箭杆 - 玻璃质感
    const gShaft = ctx.createLinearGradient(-40, -2.5, -40, 2.5);
    gShaft.addColorStop(0, 'rgba(200,230,255,0.35)'); gShaft.addColorStop(0.2, 'rgba(255,255,255,0.5)');
    gShaft.addColorStop(0.4, 'rgba(220,240,255,0.3)'); gShaft.addColorStop(0.6, 'rgba(255,255,255,0.15)');
    gShaft.addColorStop(0.8, 'rgba(200,230,255,0.4)'); gShaft.addColorStop(1, 'rgba(180,210,240,0.25)');
    ctx.fillStyle = gShaft;
    ctx.beginPath(); ctx.moveTo(-1, -2.5); ctx.lineTo(-40, -2); ctx.lineTo(-40, 2); ctx.lineTo(-1, 2.5); ctx.closePath(); ctx.fill();
    // 玻璃边缘
    ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(-1, -2.5); ctx.lineTo(-40, -2); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(-1, 2.5); ctx.lineTo(-40, 2); ctx.stroke();
    // 反光条
    ctx.strokeStyle = 'rgba(255,255,255,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.moveTo(-5, -1.5); ctx.lineTo(-35, -1); ctx.stroke();
    // 玻璃箭头
    const gHead = ctx.createLinearGradient(2, -7, 2, 7);
    gHead.addColorStop(0, 'rgba(255,255,255,0.6)'); gHead.addColorStop(0.3, 'rgba(220,240,255,0.4)');
    gHead.addColorStop(0.5, 'rgba(255,255,255,0.7)'); gHead.addColorStop(1, 'rgba(200,230,255,0.3)');
    ctx.fillStyle = gHead;
    ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(0, -7); ctx.lineTo(3, 0); ctx.lineTo(0, 7); ctx.closePath(); ctx.fill();
    ctx.strokeStyle = 'rgba(255,255,255,0.5)'; ctx.lineWidth = 0.8; ctx.stroke();
    // 箭头棱面反光
    ctx.strokeStyle = 'rgba(255,255,255,0.7)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(11, 0); ctx.lineTo(2, -3); ctx.stroke();
    // 羽毛 - 玻璃碎片
    for (let i = 0; i < 3; i++) {
      const fy = (i - 1) * 4;
      ctx.fillStyle = 'rgba(200,230,255,0.25)';
      ctx.beginPath(); ctx.moveTo(-40, fy * 0.3); ctx.lineTo(-50, fy - 4); ctx.lineTo(-52, fy); ctx.lineTo(-50, fy + 4); ctx.closePath(); ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)'; ctx.lineWidth = 0.5; ctx.stroke();
    }
  },

  arrow_transparent(color, angle, alpha) {
    const t = Date.now() / 1000;
    // 箭杆 - 极淡轮廓
    ctx.strokeStyle = 'rgba(255,255,255,0.12)'; ctx.lineWidth = 1;
    ctx.beginPath(); ctx.moveTo(-1, -2); ctx.lineTo(-40, -1.5); ctx.lineTo(-40, 1.5); ctx.lineTo(-1, 2); ctx.closePath(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.03)'; ctx.fill();
    // 中心微光
    ctx.strokeStyle = `rgba(255,255,255,${0.06 + Math.sin(t * 2) * 0.03})`; ctx.lineWidth = 0.5;
    ctx.beginPath(); ctx.moveTo(-3, 0); ctx.lineTo(-38, 0); ctx.stroke();
    // 箭头 - 极淡
    ctx.strokeStyle = 'rgba(255,255,255,0.15)'; ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(0, -7); ctx.lineTo(3, 0); ctx.lineTo(0, 7); ctx.closePath(); ctx.stroke();
    ctx.fillStyle = 'rgba(255,255,255,0.04)'; ctx.fill();
    // 箭头尖端微光
    ctx.fillStyle = `rgba(255,255,255,${0.15 + Math.sin(t * 3) * 0.05})`;
    ctx.beginPath(); ctx.arc(8, 0, 1.5, 0, Math.PI * 2); ctx.fill();
    // 羽毛 - 极淡轮廓
    for (let i = 0; i < 3; i++) {
      const fy = (i - 1) * 4;
      ctx.strokeStyle = 'rgba(255,255,255,0.1)'; ctx.lineWidth = 0.5;
      ctx.beginPath(); ctx.moveTo(-40, fy * 0.3); ctx.quadraticCurveTo(-48, fy - 5, -50, fy); ctx.quadraticCurveTo(-48, fy + 5, -40, fy * 0.3); ctx.stroke();
    }
  },

  arrow_water(color, angle, alpha) {
    const t = Date.now() / 1000;
    ctx.save();
    ctx.shadowColor = 'rgba(100,180,255,0.5)'; ctx.shadowBlur = 10;
    // 水球核心
    const coreGrad = ctx.createRadialGradient(0, 0, 0, 0, 0, 10);
    coreGrad.addColorStop(0, 'rgba(220,240,255,0.9)'); coreGrad.addColorStop(0.3, 'rgba(140,210,255,0.7)');
    coreGrad.addColorStop(0.6, 'rgba(80,160,240,0.5)'); coreGrad.addColorStop(1, 'rgba(40,120,200,0)');
    ctx.fillStyle = coreGrad;
    ctx.beginPath(); ctx.arc(0, 0, 10, 0, Math.PI * 2); ctx.fill();
    // 水流尖端（前进方向）
    const tipGrad = ctx.createLinearGradient(12, 0, -2, 0);
    tipGrad.addColorStop(0, 'rgba(220,240,255,0.8)'); tipGrad.addColorStop(0.3, 'rgba(255,255,255,0.6)');
    tipGrad.addColorStop(0.6, 'rgba(100,180,255,0.5)'); tipGrad.addColorStop(1, 'rgba(60,140,220,0)');
    ctx.fillStyle = tipGrad;
    ctx.beginPath(); ctx.moveTo(12, 0); ctx.lineTo(1, -5); ctx.lineTo(3, 0); ctx.lineTo(1, 5); ctx.closePath(); ctx.fill();
    // 水面高光
    ctx.strokeStyle = 'rgba(200,230,255,0.6)'; ctx.lineWidth = 1.5;
    ctx.beginPath(); ctx.arc(-2, -3, 4, -0.5, 1.2); ctx.stroke();
    // 水滴飞溅
    for (let i = 0; i < 6; i++) {
      const dx = -4 - i * 5 + Math.sin(t * 5 + i) * 3;
      const dy = Math.cos(t * 6 + i * 1.3) * 5;
      const ds = 2 - i * 0.2 + Math.sin(t * 4 + i) * 0.5;
      ctx.fillStyle = `rgba(140,210,255,${0.5 - i * 0.06})`;
      ctx.beginPath(); ctx.arc(dx, dy, ds, 0, Math.PI * 2); ctx.fill();
    }
    // 水流波动拖尾
    for (let i = 0; i < 4; i++) {
      const wx = -6 - i * 8;
      const wy = Math.sin(t * 4 + i * 1.5) * 3;
      const ws = 3 - i * 0.5;
      ctx.fillStyle = `rgba(100,180,255,${0.3 - i * 0.05})`;
      ctx.beginPath(); ctx.arc(wx, wy, ws, 0, Math.PI * 2); ctx.fill();
    }
    ctx.restore();
  }
};

function drawArrow(a) {
  const pos = worldToScreen(a.x, a.y);
  ctx.save();
  ctx.translate(pos.x, pos.y);
  drawArrowShape(a.color, a.angle);
  ctx.restore();
}

function drawStuckArrows() {
  stuckArrows.forEach(a => {
    if (a.life <= 0) return;
    const pos = worldToScreen(a.x, a.y);
    if (pos.y < -60 || pos.y > H + 60) return;

    ctx.save();
    ctx.translate(pos.x, pos.y);
    const fadeAlpha = Math.min(1, a.life / 60);
    drawArrowShape(a.color, a.angle, fadeAlpha);
    ctx.restore();
  });
}

function drawParticles() {
  particles.forEach(p => {
    const pos = worldToScreen(p.x, p.y);
    const alpha = Math.min(1, p.life);

    ctx.globalAlpha = alpha;

    if (p.type === 'fragment') {
      // 真实气球爆裂碎片：不规则多边形，带旋转
      ctx.save();
      ctx.translate(pos.x, pos.y);
      ctx.rotate(p.rotation);
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.moveTo(p.verts[0].x, p.verts[0].y);
      for (let i = 1; i < p.verts.length; i++) {
        ctx.lineTo(p.verts[i].x, p.verts[i].y);
      }
      ctx.closePath();
      ctx.fill();
      // 碎片边缘高光
      ctx.strokeStyle = 'rgba(255,255,255,0.3)';
      ctx.lineWidth = 0.5;
      ctx.stroke();
      ctx.restore();
    } else if (p.type === 'spark') {
      // 火花：带拖尾的亮色小点
      const sz = p.size;
      ctx.fillStyle = p.color;
      ctx.shadowColor = p.color;
      ctx.shadowBlur = 6;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // 碎片：带描边的色块
      const sz = p.size * p.life;
      ctx.fillStyle = p.color;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = 'rgba(255,255,255,0.4)';
      ctx.lineWidth = 0.8;
      ctx.stroke();
    }
  });
  ctx.globalAlpha = 1;
}

function drawDeflectedArrows() {
  deflectedArrows.forEach(da => {
    const pos = worldToScreen(da.x, da.y);
    ctx.save();
    ctx.translate(pos.x, pos.y);
    drawArrowShape(da.color, da.angle, da.life * 0.7);
    ctx.restore();
  });
}

function drawExplosions() {
  explosions.forEach(e => {
    const pos = worldToScreen(e.x, e.y);
    ctx.globalAlpha = e.life * 0.7;
    if (e.ring) {
      // 冲击波环
      ctx.strokeStyle = e.color;
      ctx.lineWidth = 3 * e.life;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, e.radius, 0, Math.PI * 2);
      ctx.stroke();
    } else {
      // 闪光圆
      const grad = ctx.createRadialGradient(pos.x, pos.y, 0, pos.x, pos.y, e.radius);
      grad.addColorStop(0, '#fff');
      grad.addColorStop(0.3, e.color);
      grad.addColorStop(1, 'transparent');
      ctx.fillStyle = grad;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, e.radius, 0, Math.PI * 2);
      ctx.fill();
    }
  });
  ctx.globalAlpha = 1;
}

function drawFloatTexts() {
  floatTexts.forEach(ft => {
    const pos = worldToScreen(ft.x, ft.y);
    ctx.globalAlpha = ft.life;
    ctx.font = `bold ${ft.size}px 'Microsoft YaHei'`;
    ctx.textAlign = 'center';
    ctx.fillStyle = '#000';
    ctx.fillText(ft.text, pos.x + 2, pos.y + 2);
    ctx.fillStyle = ft.color;
    ctx.fillText(ft.text, pos.x, pos.y);
  });
  ctx.globalAlpha = 1;
}

function drawHUD() {
  if (versusMode) {
    // 对战模式：左侧显示左方分数，右侧显示右方分数
    ctx.save();

    // 左方分数（对战模式下右移避开暂停按钮）
    const leftOffset = versusMode ? 45 : 0;
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(10 + leftOffset, 12, 80, 40, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText('左方', 50 + leftOffset, 26);
    ctx.fillStyle = '#FF3D3D';
    ctx.font = 'bold 20px "Microsoft YaHei"';
    ctx.fillText(leftScore, 50 + leftOffset, 46);

    // 右方分数
    ctx.fillStyle = 'rgba(0,0,0,0.4)';
    roundRect(W - 90, 12, 80, 40, 8);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.5)';
    ctx.font = '11px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText('右方', W - 50, 26);
    ctx.fillStyle = '#3D9EFF';
    ctx.font = 'bold 20px "Microsoft YaHei"';
    ctx.fillText(rightScore, W - 50, 46);

    // 中间显示危险类型
    ctx.fillStyle = 'rgba(255,255,255,0.4)';
    ctx.font = '11px "Microsoft YaHei"';
    ctx.textAlign = 'center';
    ctx.fillText(versusHazard === 'gear' ? '齿轮' : '火棍', W / 2, 26);

    ctx.restore();
    return;
  }

  // 顶部中间：当前得分（精致设计）
  ctx.save();
  ctx.textAlign = 'center';

  // "得分"标签
  ctx.fillStyle = 'rgba(255,255,255,0.5)';
  ctx.font = '12px "Microsoft YaHei"';
  ctx.fillText('得分', W / 2, 18);

  // 分数数字（带缩放动画+金色发光）
  ctx.save();
  ctx.translate(W / 2, 44);
  ctx.scale(scoreScale, scoreScale);
  ctx.shadowColor = 'rgba(255,215,0,0.6)';
  ctx.shadowBlur = 15;
  ctx.fillStyle = '#fff';
  ctx.font = 'bold 36px "Microsoft YaHei"';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(score, 0, 0);
  ctx.restore();

  // 装饰细线
  const lineW = 40;
  ctx.strokeStyle = 'rgba(255,215,0,0.4)';
  ctx.lineWidth = 1;
  ctx.beginPath();
  ctx.moveTo(W / 2 - lineW, 62);
  ctx.lineTo(W / 2 + lineW, 62);
  ctx.stroke();

  ctx.restore();

  // 右上：最高分（自适应宽度）
  const bestText = '最高: ' + getBestScore(currentLevelId);
  ctx.font = 'bold 14px "Microsoft YaHei"';
  const bestW = ctx.measureText(bestText).width + 20;
  ctx.fillStyle = 'rgba(0,0,0,0.4)';
  roundRect(W - bestW - 10, 12, bestW, 30, 8);
  ctx.fill();
  ctx.fillStyle = '#FFD700';
  ctx.textAlign = 'right';
  ctx.fillText(bestText, W - 20, 33);

  // 倒计时显示
  if (countdownMode === 1 && countdown > 0) {
    // 1秒倒计时：用进度条代替数字
    const barFill = document.getElementById('countdown-bar-fill');
    if (barFill) {
      const pct = Math.max(0, countdown / countdownMax) * 100;
      barFill.style.width = pct + '%';
      // 快到0时变红
      if (countdown <= 0.3) {
        barFill.style.background = 'linear-gradient(90deg, #FF5252, #FF8A80)';
      } else {
        barFill.style.background = 'linear-gradient(90deg, #4CAF50, #81C784)';
      }
    }
  } else if (countdownMode === 2 && countdown > 0) {
    // 总计时：仍用数字显示
    const isUrgent = countdown <= 10;
    const countdownColor = isUrgent ? '#FF5252' : '#4CAF50';
    const display = Math.ceil(countdown).toString();
    ctx.font = 'bold 28px "Microsoft YaHei"';
    const cdW = ctx.measureText(display).width + 24;
    ctx.fillStyle = 'rgba(0,0,0,0.35)';
    roundRect(W / 2 - cdW / 2, 68, cdW, 32, 8);
    ctx.fill();
    ctx.fillStyle = countdownColor;
    ctx.textAlign = 'center';
    ctx.fillText(display, W / 2, 90);
  }
}

function roundRect(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}

function drawGear() {
  if ((!versusMode || versusHazard !== 'gear') && !singleGearEnabled) return;
  const pos = worldToScreen(0, gearY);
  if (pos.y < -100 || pos.y > H + 100) return;

  const cx = pos.x;
  const cy = pos.y;
  const radius = 60;
  const t = Date.now() / 1000;
  const rot = t * 3.6; // 旋转角度（1.8倍速）

  // 手动旋转辅助函数
  function rotX(x, y) { return x * Math.cos(rot) - y * Math.sin(rot); }
  function rotY(x, y) { return x * Math.sin(rot) + y * Math.cos(rot); }

  // 齿轮外圈锯齿
  const teeth = 12;
  const innerR = radius * 0.75;
  const outerR = radius;

  // 金属渐变（用平移后的中心）
  const gearGrad = ctx.createRadialGradient(cx, cy, innerR * 0.3, cx, cy, outerR);
  gearGrad.addColorStop(0, '#C0C0C0');
  gearGrad.addColorStop(0.4, '#A0A0A0');
  gearGrad.addColorStop(0.7, '#808080');
  gearGrad.addColorStop(1, '#606060');

  ctx.fillStyle = gearGrad;
  ctx.beginPath();
  for (let i = 0; i < teeth; i++) {
    const a1 = (i / teeth) * Math.PI * 2;
    const a2 = ((i + 0.3) / teeth) * Math.PI * 2;
    const a3 = ((i + 0.5) / teeth) * Math.PI * 2;
    const a4 = ((i + 0.8) / teeth) * Math.PI * 2;
    const x1 = Math.cos(a1) * innerR, y1 = Math.sin(a1) * innerR;
    const x2 = Math.cos(a2) * outerR, y2 = Math.sin(a2) * outerR;
    const x3 = Math.cos(a3) * outerR, y3 = Math.sin(a3) * outerR;
    const x4 = Math.cos(a4) * innerR, y4 = Math.sin(a4) * innerR;
    if (i === 0) {
      ctx.moveTo(cx + rotX(x1, y1), cy + rotY(x1, y1));
    }
    ctx.lineTo(cx + rotX(x2, y2), cy + rotY(x2, y2));
    ctx.lineTo(cx + rotX(x3, y3), cy + rotY(x3, y3));
    ctx.lineTo(cx + rotX(x4, y4), cy + rotY(x4, y4));
  }
  ctx.closePath();
  ctx.fill();

  // 齿轮描边
  ctx.strokeStyle = 'rgba(0,0,0,0.4)';
  ctx.lineWidth = 2;
  ctx.stroke();

  // 中心圆
  const centerGrad = ctx.createRadialGradient(cx, cy, 2, cx, cy, innerR * 0.5);
  centerGrad.addColorStop(0, '#D0D0D0');
  centerGrad.addColorStop(0.5, '#909090');
  centerGrad.addColorStop(1, '#707070');
  ctx.fillStyle = centerGrad;
  ctx.beginPath();
  ctx.arc(cx, cy, innerR * 0.5, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = 'rgba(0,0,0,0.3)';
  ctx.lineWidth = 1.5;
  ctx.stroke();

  // 中心孔
  ctx.fillStyle = '#333';
  ctx.beginPath();
  ctx.arc(cx, cy, innerR * 0.15, 0, Math.PI * 2);
  ctx.fill();

  // 辐条（手动旋转）
  ctx.strokeStyle = 'rgba(0,0,0,0.25)';
  ctx.lineWidth = 4;
  for (let i = 0; i < 4; i++) {
    const a = (i / 4) * Math.PI * 2;
    const sx = Math.cos(a) * innerR * 0.18, sy = Math.sin(a) * innerR * 0.18;
    const ex = Math.cos(a) * innerR * 0.48, ey = Math.sin(a) * innerR * 0.48;
    ctx.beginPath();
    ctx.moveTo(cx + rotX(sx, sy), cy + rotY(sx, sy));
    ctx.lineTo(cx + rotX(ex, ey), cy + rotY(ex, ey));
    ctx.stroke();
  }

  // 旋转方向标记：醒目的红色三角箭头
  const tri1 = [
    [0, -innerR * 0.55],
    [-8, -innerR * 0.35],
    [8, -innerR * 0.35]
  ];
  ctx.fillStyle = '#DD2222';
  ctx.beginPath();
  ctx.moveTo(cx + rotX(tri1[0][0], tri1[0][1]), cy + rotY(tri1[0][0], tri1[0][1]));
  ctx.lineTo(cx + rotX(tri1[1][0], tri1[1][1]), cy + rotY(tri1[1][0], tri1[1][1]));
  ctx.lineTo(cx + rotX(tri1[2][0], tri1[2][1]), cy + rotY(tri1[2][0], tri1[2][1]));
  ctx.closePath();
  ctx.fill();

  const tri2 = [
    [0, innerR * 0.55],
    [-8, innerR * 0.35],
    [8, innerR * 0.35]
  ];
  ctx.fillStyle = '#DD2222';
  ctx.beginPath();
  ctx.moveTo(cx + rotX(tri2[0][0], tri2[0][1]), cy + rotY(tri2[0][0], tri2[0][1]));
  ctx.lineTo(cx + rotX(tri2[1][0], tri2[1][1]), cy + rotY(tri2[1][0], tri2[1][1]));
  ctx.lineTo(cx + rotX(tri2[2][0], tri2[2][1]), cy + rotY(tri2[2][0], tri2[2][1]));
  ctx.closePath();
  ctx.fill();

  // 危险红色发光
  ctx.save();
  ctx.shadowColor = 'rgba(255,50,50,0.4)';
  ctx.shadowBlur = 20;
  ctx.strokeStyle = 'rgba(255,80,80,0.3)';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.arc(cx, cy, radius + 5, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}

function drawClouds() {
  if (!cloudEnabled) return;
  // 云朵固定在屏幕上，不随相机移动
  const cloudScreenY = H * 0.45; // 屏幕中间偏上位置
  const cloudMidY = cloudScreenY;
  const cloudH = cloudThickness;

  // 绘制单朵云的辅助函数：由多个圆形叠加组成蓬松云朵
  function drawOneCloud(startX, width, direction) {
    // direction: -1=左云(从左往右扩展), 1=右云(从右往左扩展)
    ctx.save();

    // 云朵的圆形泡泡配置 [相对x比例, 相对y偏移, 半径比例]
    // 这些泡泡会沿宽度方向排列，形成蓬松的云朵形状
    const bubbleCount = Math.max(3, Math.floor(width / 30));
    const bubbles = [];
    for (let i = 0; i < bubbleCount; i++) {
      const ratio = i / (bubbleCount - 1); // 0~1
      const rx = startX + ratio * width;
      // 底层大泡泡（形成云的主体）
      const baseR = cloudH * 0.45 + Math.sin(i * 2.3 + 0.5) * cloudH * 0.1;
      const baseY = cloudMidY + Math.sin(i * 1.7 + 0.3) * cloudH * 0.08;
      bubbles.push({ x: rx, y: baseY, r: baseR });
      // 顶部小泡泡（蓬松感）
      if (i % 2 === 0) {
        const topR = cloudH * 0.3 + Math.sin(i * 3.1 + 1.2) * cloudH * 0.08;
        const topY = cloudMidY - cloudH * 0.2 + Math.sin(i * 2.1 + 0.7) * cloudH * 0.06;
        bubbles.push({ x: rx + Math.sin(i * 1.3) * 10, y: topY, r: topR });
      }
      // 底部填充泡泡
      if (i % 3 === 0) {
        const botR = cloudH * 0.25;
        const botY = cloudMidY + cloudH * 0.15;
        bubbles.push({ x: rx + Math.sin(i * 0.9) * 8, y: botY, r: botR });
      }
    }

    // 前端（移动方向的那一端）加一个大的蓬松头
    const headX = direction === -1 ? startX + width : startX;
    const headR = cloudH * 0.55;
    const headY = cloudMidY - cloudH * 0.05;
    bubbles.push({ x: headX, y: headY, r: headR });
    // 头顶小泡泡
    bubbles.push({ x: headX + direction * 5, y: headY - cloudH * 0.25, r: cloudH * 0.3 });
    bubbles.push({ x: headX - direction * 8, y: headY - cloudH * 0.15, r: cloudH * 0.25 });

    // 后端（靠屏幕边缘）封底
    const tailX = direction === -1 ? startX : startX + width;
    bubbles.push({ x: tailX, y: cloudMidY, r: cloudH * 0.4 });

    // 绘制阴影层
    ctx.fillStyle = 'rgba(160, 170, 185, 0.3)';
    bubbles.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y + 4, b.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // 绘制主体层（白色偏灰）
    ctx.fillStyle = 'rgba(230, 235, 245, 0.85)';
    bubbles.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.r, 0, Math.PI * 2);
      ctx.fill();
    });

    // 绘制高光层（顶部亮白）
    ctx.fillStyle = 'rgba(255, 255, 255, 0.5)';
    bubbles.forEach(b => {
      ctx.beginPath();
      ctx.arc(b.x, b.y - b.r * 0.25, b.r * 0.7, 0, Math.PI * 2);
      ctx.fill();
    });

    // 顶部高光点
    ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
    bubbles.forEach(b => {
      if (b.r > cloudH * 0.3) {
        ctx.beginPath();
        ctx.arc(b.x - b.r * 0.15, b.y - b.r * 0.4, b.r * 0.25, 0, Math.PI * 2);
        ctx.fill();
      }
    });

    ctx.restore();
  }

  // 左云（整朵云从左侧滑入，裁剪控制可见性）
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, W / 2, H); // 裁剪到左半屏
  ctx.clip();
  drawOneCloud(cloudOffsetLeft, W / 2, -1);
  ctx.restore();

  // 右云（整朵云从右侧滑入，裁剪控制可见性）
  ctx.save();
  ctx.beginPath();
  ctx.rect(W / 2, 0, W / 2, H); // 裁剪到右半屏
  ctx.clip();
  drawOneCloud(W / 2 + cloudOffsetRight, W / 2, 1);
  ctx.restore();
}

// 闪电特效：创建一道闪电
function createLightningEffect(targetX, targetY, color, side) {
  // 左边气球从左侧劈出，右边气球从右侧劈出
  const fromLeft = side === -1 || (side !== 1 && targetX < W / 2);
  const startX = fromLeft ? 0 : W;
  const startY = H * 0.3 + Math.random() * H * 0.4; // 屏幕中间区域随机高度

  // 生成主干闪电路径（中点位移算法，maxDisp=35增加弯曲真实感）
  const mainPoints = generateLightningPoints(startX, startY, targetX, targetY, 5, 35);

  // 生成分叉
  const branches = [];
  for (let i = 3; i < mainPoints.length - 3; i += 4) {
    if (Math.random() < 0.4) {
      const p = mainPoints[i];
      const angle = Math.atan2(targetY - startY, targetX - startX) + (Math.random() - 0.5) * 1.0;
      const len = 20 + Math.random() * 40;
      const bEndX = p.x + Math.cos(angle) * len;
      const bEndY = p.y + Math.sin(angle) * len;
      branches.push(generateLightningPoints(p.x, p.y, bEndX, bEndY, 3, 12));
    }
  }

  lightningEffects.push({
    startX, startY, endX: targetX, endY: targetY,
    mainPoints, branches, color,
    life: 10, maxLife: 10
  });

  // 50%概率追加一条闪电（双击效果）
  if (Math.random() > 0.5) {
    const startX2 = fromLeft ? 0 : W;
    const startY2 = H * 0.3 + Math.random() * H * 0.4;
    const mainPoints2 = generateLightningPoints(startX2, startY2, targetX, targetY, 5, 35);
    const branches2 = [];
    for (let i = 3; i < mainPoints2.length - 3; i += 4) {
      if (Math.random() < 0.35) {
        const p = mainPoints2[i];
        const angle = Math.atan2(targetY - startY2, targetX - startX2) + (Math.random() - 0.5) * 1.0;
        const len = 15 + Math.random() * 30;
        branches2.push(generateLightningPoints(p.x, p.y, p.x + Math.cos(angle) * len, p.y + Math.sin(angle) * len, 3, 10));
      }
    }
    lightningEffects.push({
      startX: startX2, startY: startY2, endX: targetX, endY: targetY,
      mainPoints: mainPoints2, branches: branches2, color,
      life: 8, maxLife: 8
    });
  }
}

// 中点位移算法生成闪电路径
function generateLightningPoints(x1, y1, x2, y2, generations, maxDisp) {
  let points = [{ x: x1, y: y1 }, { x: x2, y: y2 }];
  let displacement = maxDisp;
  for (let g = 0; g < generations; g++) {
    let newPoints = [];
    for (let j = 0; j < points.length - 1; j++) {
      const p1 = points[j], p2 = points[j + 1];
      const midX = (p1.x + p2.x) / 2;
      const midY = (p1.y + p2.y) / 2;
      const dx = p2.x - p1.x, dy = p2.y - p1.y;
      const len = Math.sqrt(dx * dx + dy * dy) || 1;
      const nx = -dy / len, ny = dx / len;
      const offset = (Math.random() - 0.5) * displacement;
      newPoints.push(p1);
      newPoints.push({ x: midX + nx * offset, y: midY + ny * offset });
    }
    newPoints.push(points[points.length - 1]);
    points = newPoints;
    displacement *= 0.45;
  }
  return points;
}

// 绘制闪电特效
function drawLightningEffects() {
  lightningEffects = lightningEffects.filter(e => e.life > 0);
  lightningEffects.forEach(e => {
    e.life--;
    let alpha = e.life / e.maxLife;
    // 随机闪烁
    if (Math.random() > 0.6) alpha *= 0.3;
    const c = COLORS[e.color];

    ctx.save();
    ctx.shadowColor = c; ctx.shadowBlur = 20;

    // 绘制主干（三层辉光）
    drawLightningPath(e.mainPoints, 6, alpha, false);
    // 绘制分叉
    e.branches.forEach(b => drawLightningPath(b, 3, alpha * 0.6, true));

    // 命中点闪光球
    const hitGrad = ctx.createRadialGradient(e.endX, e.endY, 0, e.endX, e.endY, 15);
    hitGrad.addColorStop(0, '#fff');
    hitGrad.addColorStop(0.3, c);
    hitGrad.addColorStop(1, 'rgba(0,191,255,0)');
    ctx.fillStyle = hitGrad;
    ctx.beginPath(); ctx.arc(e.endX, e.endY, 15, 0, Math.PI * 2); ctx.fill();

    ctx.restore();
  });
}

// 绘制单条闪电路径（多层辉光）
function drawLightningPath(points, baseWidth, alpha, isBranch) {
  // 外层浅蓝辉光
  ctx.strokeStyle = `rgba(0, 191, 255, ${alpha * 0.2})`;
  ctx.lineWidth = isBranch ? baseWidth * 0.5 : baseWidth;
  ctx.lineCap = 'round'; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.stroke();
  // 中层蓝白过渡
  ctx.strokeStyle = `rgba(100, 230, 255, ${alpha * 0.6})`;
  ctx.lineWidth = isBranch ? baseWidth * 0.25 : baseWidth * 0.5;
  ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.stroke();
  // 内层白色核心
  ctx.strokeStyle = `rgba(255, 255, 255, ${alpha})`;
  ctx.lineWidth = isBranch ? baseWidth * 0.1 : baseWidth * 0.2;
  ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
  for (let i = 1; i < points.length; i++) ctx.lineTo(points[i].x, points[i].y);
  ctx.stroke();
}

function drawShieldBreakEffects() {
  shieldBreakEffects = shieldBreakEffects.filter(e => e.life > 0);
  shieldBreakEffects.forEach(e => {
    e.life -= 0.03;
    e.particles.forEach(p => {
      p.x += p.vx;
      p.y += p.vy;
      p.vy += 0.1;
      const pos = worldToScreen(p.x, p.y);
      const radius = Math.max(0.1, p.size * Math.max(0, e.life));
      ctx.fillStyle = `rgba(100, 200, 255, ${Math.max(0, e.life)})`;
      ctx.beginPath();
      ctx.arc(pos.x, pos.y, radius, 0, Math.PI * 2);
      ctx.fill();
    });
  });
}

function createShieldBreakEffect(x, y) {
  const particles = [];
  for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const spd = 2 + Math.random() * 3;
    particles.push({
      x, y,
      vx: Math.cos(angle) * spd,
      vy: Math.sin(angle) * spd - 1,
      size: 3 + Math.random() * 3
    });
  }
  shieldBreakEffects.push({ x, y, life: 1, particles });
}

function drawFireSticks() {
  if (!versusMode || versusHazard !== 'firestick') return;
  const t = Date.now() / 1000;

  fireSticks.forEach(stick => {
    const pos = worldToScreen(0, stick.y);
    if (pos.y < -50 || pos.y > H + 50) return;

    const cx = pos.x;
    const cy = pos.y;
    const halfW = 65; // 横棍半宽

    if (stick.burning) {
      // 着火横棍
      // 火焰底色
      const fireGrad = ctx.createLinearGradient(cx - halfW, cy, cx + halfW, cy);
      fireGrad.addColorStop(0, '#8B4513');
      fireGrad.addColorStop(0.3, '#FF6600');
      fireGrad.addColorStop(0.5, '#FF3300');
      fireGrad.addColorStop(0.7, '#FF6600');
      fireGrad.addColorStop(1, '#8B4513');
      ctx.fillStyle = fireGrad;
      ctx.fillRect(cx - halfW, cy - 4, halfW * 2, 8);

      // 火焰粒子（下落时火焰向上飘）
      const flameDir = stick.falling ? -1 : 1;
      for (let i = 0; i < 12; i++) {
        const fx = cx - halfW + (i / 11) * halfW * 2;
        const fy = cy + flameDir * (-8 - Math.sin(t * 8 + i * 1.5) * 8 - Math.random() * 6);
        const fs = 3 + Math.sin(t * 10 + i) * 2;
        const alpha = 0.6 + Math.sin(t * 6 + i * 0.8) * 0.3;
        ctx.fillStyle = i % 3 === 0 ? `rgba(255,255,100,${alpha})` :
                       i % 3 === 1 ? `rgba(255,150,0,${alpha})` :
                       `rgba(255,60,0,${alpha})`;
        ctx.beginPath();
        ctx.arc(fx, fy, fs, 0, Math.PI * 2);
        ctx.fill();
      }

      // 发光效果
      ctx.save();
      ctx.shadowColor = 'rgba(255,100,0,0.5)';
      ctx.shadowBlur = 15;
      ctx.strokeStyle = 'rgba(255,150,0,0.4)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(cx - halfW, cy);
      ctx.lineTo(cx + halfW, cy);
      ctx.stroke();
      ctx.restore();

      // 下落时的拖尾效果
      if (stick.falling && stick.fallSpeed > 2) {
        const trailAlpha = Math.min(0.4, stick.fallSpeed * 0.03);
        ctx.fillStyle = `rgba(255,100,0,${trailAlpha})`;
        ctx.fillRect(cx - halfW, cy - 20, halfW * 2, 20);
      }
    } else {
      // 普通木棍
      const woodGrad = ctx.createLinearGradient(cx - halfW, cy - 4, cx - halfW, cy + 4);
      woodGrad.addColorStop(0, '#A0724C');
      woodGrad.addColorStop(0.3, '#8B6914');
      woodGrad.addColorStop(0.7, '#6B4914');
      woodGrad.addColorStop(1, '#5A3A10');
      ctx.fillStyle = woodGrad;
      roundRect(cx - halfW, cy - 4, halfW * 2, 8, 3);
      ctx.fill();

      // 木纹
      ctx.strokeStyle = 'rgba(0,0,0,0.15)';
      ctx.lineWidth = 0.5;
      for (let i = 0; i < 5; i++) {
        const lx = cx - halfW + 10 + i * 25;
        ctx.beginPath();
        ctx.moveTo(lx, cy - 3);
        ctx.lineTo(lx + 5, cy + 3);
        ctx.stroke();
      }
    }
  });
}

// ==================== 更新 ====================
let lastTime = 0;
// ==================== 按钮移动（第17关） ====================
function initMovingButtons() {
  movingBtns = [];
  const btnIds = ['btn-red', 'btn-blue', 'btn-green', 'btn-yellow'];
  const btns = document.getElementById('game-color-btns');
  const containerRect = btns.getBoundingClientRect();

  btnIds.forEach(id => {
    const el = document.getElementById(id);
    if (el.style.display === 'none') return;
    const r = el.getBoundingClientRect();
    const origX = r.left - containerRect.left;
    const origY = r.top - containerRect.top;
    movingBtns.push({
      id,
      x: origX, y: origY,
      vx: (Math.random() - 0.5) * 2,
      vy: (Math.random() - 0.5) * 2,
      origX, origY,
      w: r.width, h: r.height,
      containerW: containerRect.width,
      containerH: containerRect.height
    });
    el.style.position = 'relative';
    el.style.left = '0px';
    el.style.top = '0px';
  });
}

function updateMovingButtons(dt) {
  const padding = 4; // 按钮间最小间距

  // 先更新速度和位置
  movingBtns.forEach(mb => {
    // 随机扰动方向
    mb.vx += (Math.random() - 0.5) * 0.3 * dt;
    mb.vy += (Math.random() - 0.5) * 0.3 * dt;
    // 限速
    const maxSpeed = 1.2;
    mb.vx = Math.max(-maxSpeed, Math.min(maxSpeed, mb.vx));
    mb.vy = Math.max(-maxSpeed, Math.min(maxSpeed, mb.vy));
    // 移动
    mb.x += mb.vx * dt;
    mb.y += mb.vy * dt;
    // 容器边界反弹
    if (mb.x < 0) { mb.x = 0; mb.vx = Math.abs(mb.vx); }
    if (mb.x + mb.w > mb.containerW) { mb.x = mb.containerW - mb.w; mb.vx = -Math.abs(mb.vx); }
    if (mb.y < 0) { mb.y = 0; mb.vy = Math.abs(mb.vy); }
    if (mb.y + mb.h > mb.containerH) { mb.y = mb.containerH - mb.h; mb.vy = -Math.abs(mb.vy); }
  });

  // 碰撞检测：按钮之间不重叠
  for (let i = 0; i < movingBtns.length; i++) {
    for (let j = i + 1; j < movingBtns.length; j++) {
      const a = movingBtns[i];
      const b = movingBtns[j];
      // AABB碰撞检测
      const overlapX = (a.w / 2 + b.w / 2 + padding) - Math.abs((a.x + a.w / 2) - (b.x + b.w / 2));
      const overlapY = (a.h / 2 + b.h / 2 + padding) - Math.abs((a.y + a.h / 2) - (b.y + b.h / 2));
      if (overlapX > 0 && overlapY > 0) {
        // 分离：沿重叠最小的轴推开
        if (overlapX < overlapY) {
          const sign = (a.x + a.w / 2) < (b.x + b.w / 2) ? -1 : 1;
          a.x += sign * overlapX / 2;
          b.x -= sign * overlapX / 2;
          // 交换x方向速度（弹性碰撞）
          const tmpVx = a.vx;
          a.vx = b.vx;
          b.vx = tmpVx;
        } else {
          const sign = (a.y + a.h / 2) < (b.y + b.h / 2) ? -1 : 1;
          a.y += sign * overlapY / 2;
          b.y -= sign * overlapY / 2;
          const tmpVy = a.vy;
          a.vy = b.vy;
          b.vy = tmpVy;
        }
        // 碰撞后重新限制在容器内
        [a, b].forEach(mb => {
          if (mb.x < 0) { mb.x = 0; mb.vx = Math.abs(mb.vx); }
          if (mb.x + mb.w > mb.containerW) { mb.x = mb.containerW - mb.w; mb.vx = -Math.abs(mb.vx); }
          if (mb.y < 0) { mb.y = 0; mb.vy = Math.abs(mb.vy); }
          if (mb.y + mb.h > mb.containerH) { mb.y = mb.containerH - mb.h; mb.vy = -Math.abs(mb.vy); }
        });
      }
    }
  }

  // 应用位置
  movingBtns.forEach(mb => {
    const el = document.getElementById(mb.id);
    // 相对于原始布局位置的偏移：需要计算原始位置
    // 使用绝对定位方式：直接设置left/top为计算后的坐标
    el.style.left = (mb.x - mb.origX) + 'px';
    el.style.top = (mb.y - mb.origY) + 'px';
  });
}

function resetMovingButtons() {
  movingBtns.forEach(mb => {
    const el = document.getElementById(mb.id);
    el.style.left = '0px';
    el.style.top = '0px';
    el.style.position = '';
  });
  movingBtns = [];
}

// ==================== 按钮换位（第18关） ====================

function initBtnShuffle() {
  // 首次随机换位
  shuffleButtonPositions();
}

function shuffleButtonPositions() {
  const container = document.getElementById('game-color-btns');
  const colorBtnIds = ['btn-red', 'btn-blue', 'btn-green'];
  
  // 获取可见的颜色按钮元素
  const visible = colorBtnIds.filter(id => {
    const el = document.getElementById(id);
    return el && el.style.display !== 'none';
  });
  
  if (visible.length < 2) return; // 少于2个按钮无需换位
  
  // Fisher-Yates洗牌
  const shuffled = [...visible];
  for (let i = shuffled.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
  }
  
  // 确保洗牌后顺序和原来不同
  let same = shuffled.every((id, i) => id === visible[i]);
  if (same && shuffled.length >= 2) {
    [shuffled[0], shuffled[1]] = [shuffled[1], shuffled[0]];
  }
  
  // 翻书动画：先翻到侧面（rotateY=90°），到一半时执行DOM重排，再翻回来
  const btnEls = visible.map(id => document.getElementById(id)).filter(Boolean);
  const flipDuration = 250; // 毫秒，加快动画
  
  // 翻转期间禁止点击，防止误触
  btnFlipping = true;
  btnEls.forEach(el => { el.style.pointerEvents = 'none'; });
  
  // 添加翻书动画
  btnEls.forEach(el => {
    el.style.animation = `btnFlip ${flipDuration}ms ease-in-out`;
  });
  
  // 动画到一半时执行DOM重排
  setTimeout(() => {
    const allChildren = Array.from(container.children);
    const refEl = allChildren.find(el => !colorBtnIds.includes(el.id));
    
    shuffled.forEach(id => {
      const el = document.getElementById(id);
      if (el) {
        if (refEl) {
          container.insertBefore(el, refEl);
        } else {
          container.appendChild(el);
        }
      }
    });
  }, flipDuration / 2);
  
  // 动画结束后清除animation并恢复点击
  setTimeout(() => {
    btnEls.forEach(el => {
      el.style.animation = '';
      el.style.pointerEvents = '';
    });
    btnFlipping = false;
  }, flipDuration);
}

function resetBtnShuffle() {
  // 恢复按钮原始DOM顺序：红、蓝、绿、黄、左右按钮
  const container = document.getElementById('game-color-btns');
  const originalOrder = ['btn-red', 'btn-blue', 'btn-green', 'btn-yellow', 'btn-left-red', 'btn-left-blue', 'btn-right-blue', 'btn-right-red'];
  originalOrder.forEach(id => {
    const el = document.getElementById(id);
    if (el) container.appendChild(el);
  });
}

function update(t) {
  const dt = Math.min((t - lastTime) / 16.67, 3);
  lastTime = t;

  // 弹飞箭在任何状态下都继续更新
  deflectedArrows.forEach(da => {
    da.x += da.vx * dt;
    da.y += da.vy * dt;
    da.vy += 0.15 * dt;
    da.angle += da.spin * dt;
  });
  deflectedArrows = deflectedArrows.filter(da => {
    const pos = worldToScreen(da.x, da.y);
    return pos.x > -100 && pos.x < W + 100 && pos.y > -200 && pos.y < H + 200;
  });

  // 分数缩放动画
  if (scoreScaleTimer > 0) { scoreScaleTimer -= dt; } else { scoreScale += (1 - scoreScale) * 0.1; }

  // 空闲状态也更新气球动画
  if (state === 'idle') {
    return;
  }

  // 暂停状态不更新
  if (state === 'paused') {
    return;
  }

  // 关卡9的ready状态：吹气球+倒计时动画
  if (state === 'ready') {
    readyTimer += dt;
    readyPhaseTime += dt;

    // 气球从下到上依次吹大
    const sortedBalloons = [...balloons].sort((a, b) => b.y - a.y); // 下面的先吹
    sortedBalloons.forEach((b, i) => {
      const delay = i * 2; // 每个气球延迟2帧
      const elapsed = readyTimer - delay;
      if (elapsed > 0) {
        b.scale = Math.min(1, elapsed / 10); // 10帧内吹到满
      }
    });

    // 倒计时阶段切换（每个数字0.6秒，比正常秒快）
    if (readyPhase === 0 && readyTimer > 20) {
      readyPhase = 1; readyPhaseTime = 0; // 显示3
    } else if (readyPhase === 1 && readyPhaseTime > 36) {
      readyPhase = 2; readyPhaseTime = 0; // 显示2
    } else if (readyPhase === 2 && readyPhaseTime > 36) {
      readyPhase = 3; readyPhaseTime = 0; // 显示1
    } else if (readyPhase === 3 && readyPhaseTime > 36) {
      readyPhase = 4; readyPhaseTime = 0; // 显示"开始!"
    } else if (readyPhase === 4 && readyPhaseTime > 24) {
      state = 'playing'; // 开始游戏
      startBgm();
    }
    return;
  }

  if (state !== 'playing' && state !== 'dying') return;

  // 倒计时更新（dying状态暂停倒计时）
  if (state === 'playing' && countdownMode > 0 && countdown > 0) {
    countdown -= dt / 60;
    if (countdown <= 0) {
      countdown = 0;
      gameOver();
      return;
    }
  }

  const sCam = getLevelStrategy();
  if (sCam && sCam.updateCamera) {
    sCam.updateCamera(dt);
  } else {
    const target = getTargetBalloon();
    if (target) {
      cameraY += (target.y - cameraY) * 0.1 * dt;
    }
  }

  // 对战模式：齿轮/火棍更新
  if (versusMode && state === 'playing') {
    if (versusHazard === 'gear') {
      // 齿轮速度随分差动态变化：分差大加速，分差小减速，最慢不低于初始速度
      if (currentLevelId === 16 || currentLevelId === 24 || currentLevelId === 25 || currentLevelId === 26 || currentLevelId === 27 || currentLevelId === 28) {
        const diff = Math.abs(leftScore - rightScore);
        gearSpeed = 2.0 + diff * 0.8; // 分差越大速度越快
      } else {
        gearSpeed += 0.005 * dt;
      }
      gearY -= gearSpeed * dt;

      // 齿轮距离落后玩家的最大距离限制
      const leftTarget = getTargetBalloon(-1);
      const rightTarget = getTargetBalloon(1);
      // 落后玩家 = 目标气球Y值更大的那方（Y轴向下为正，Y大=更靠下=更落后）
      let trailingY = gearY; // 默认不限制
      if (leftTarget && rightTarget) {
        trailingY = Math.max(leftTarget.y, rightTarget.y);
      } else if (leftTarget) {
        trailingY = leftTarget.y;
      } else if (rightTarget) {
        trailingY = rightTarget.y;
      }
      // 齿轮不能低于落后玩家下方gearMaxDist的位置
      const gearMinY = trailingY + gearMaxDist;
      if (gearY > gearMinY) {
        gearY = gearMinY;
      }

      // 第28关：右边气球每隔0.7秒自动爆炸
      if (currentLevelId === 28) {
        const s28 = getLevelStrategy();
        s28.autoExplodeTimer += dt / 60;
        if (s28.autoExplodeTimer >= 0.3) {
          s28.autoExplodeTimer -= 0.3;
          // 找到右边最底部的活着的气球
          const rightBalloons = balloons.filter(b => b.alive && b.side === 1 && !b.targeted);
          if (rightBalloons.length > 0) {
            const target = rightBalloons.reduce((a, b) => a.y > b.y ? a : b);
            target.alive = false;
            rightScore++; // 右边自动爆炸也算分
            score = leftScore + rightScore;
            playBubblePop();
            explosions.push({
              x: target.x, y: target.y,
              color: COLORS_LIGHT[target.color],
              radius: 5, maxRadius: 40, life: 1
            });
            particles.push({
              x: target.x, y: target.y,
              vx: (Math.random() - 0.5) * 6,
              vy: (Math.random() - 0.5) * 6 - 2,
              color: COLORS[target.color],
              size: 4 + Math.random() * 4,
              life: 0.8,
              type: 'spark'
            });
          }
        }
      }

      // 齿轮碰到气球时气球爆炸
      let gearHitLeft = false;
      let gearHitRight = false;
      balloons.forEach(b => {
        if (!b.alive) return;
        if (Math.abs(b.y - gearY) < 30) {
          b.alive = false;
          playBubblePop();
          if (b.side === -1) gearHitLeft = true;
          else if (b.side === 1) gearHitRight = true;
          explosions.push({
            x: b.x, y: b.y,
            color: COLORS_LIGHT[b.color],
            radius: 5, maxRadius: 40, life: 1
          });
          particles.push({
            x: b.x, y: b.y,
            vx: (Math.random() - 0.5) * 6,
            vy: (Math.random() - 0.5) * 6 - 2,
            color: COLORS[b.color],
            size: 4 + Math.random() * 4,
            life: 0.8,
            type: 'spark'
          });
        }
      });

      // 齿轮碰到哪边气球哪边输
      if (currentLevelId === 16 || currentLevelId === 24 || currentLevelId === 25 || currentLevelId === 26 || currentLevelId === 27 || currentLevelId === 28) {
        if (gearHitLeft && gearHitRight) {
          versusLoser = 'draw';
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        } else if (gearHitLeft) {
          versusLoser = 'left';
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        } else if (gearHitRight) {
          versusLoser = 'right';
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        }
      } else {
        const leftTarget = getTargetBalloon(-1);
        const rightTarget = getTargetBalloon(1);
        let leftHit = leftTarget && gearY <= leftTarget.y;
        let rightHit = rightTarget && gearY <= rightTarget.y;
        if (leftHit && rightHit) {
          versusLoser = 'draw';
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        } else if (leftHit) {
          versusLoser = 'left';
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        } else if (rightHit) {
          versusLoser = 'right';
          state = 'dying';
          setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
        }
      }
    } else if (versusHazard === 'firestick') {
      // 领先方领先7个气球时，所有火棍着火
      let versusLoserThisFrame = null;
      if (Math.abs(leftScore - rightScore) >= 7) {
        fireSticks.forEach(stick => {
          if (!stick.burning) {
            stick.burning = true;
          }
        });
      }

      fireSticks.forEach(stick => {
        // 着火后开始自由落体
        if (stick.burning && !stick.falling) {
          stick.falling = true;
          stick.fallSpeed = 0;
        }

        // 更新下落中的火棍
        if (stick.falling) {
          stick.fallSpeed += 0.8 * dt; // 重力加速
          stick.y += stick.fallSpeed * dt; // 向下移动（Y增大=向下）

          // 碰到气球就碎
          balloons.forEach(b => {
            if (!b.alive) return;
            if (Math.abs(b.y - stick.y) < 20) {
              b.alive = false;
              playBubblePop();
              explosions.push({
                x: b.x, y: b.y,
                color: COLORS_LIGHT[b.color],
                radius: 5, maxRadius: 40, life: 1
              });
              particles.push({
                x: b.x, y: b.y,
                vx: (Math.random() - 0.5) * 6,
                vy: (Math.random() - 0.5) * 6 - 2,
                color: COLORS[b.color],
                size: 4 + Math.random() * 4,
                life: 0.8,
                type: 'spark'
              });
            }
          });

          // 判定落后方输
          if (!versusLoserThisFrame && !versusLoser) {
            if (leftScore < rightScore) versusLoserThisFrame = 'left';
            else if (rightScore < leftScore) versusLoserThisFrame = 'right';
            else versusLoserThisFrame = 'draw';
          }
        }
      });

      if (versusLoserThisFrame) {
        versusLoser = versusLoserThisFrame;
        state = 'dying';
        setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
      }
    }
  }

  // 单人模式齿轮更新（第11关等）
  if (singleGearEnabled && !versusMode && state === 'playing') {
    gearSpeed += 0.003 * dt;
    gearY -= gearSpeed * dt;

    // 齿轮碰到目标气球→game over
    const target = getTargetBalloon();
    if (target && gearY <= target.y) {
      state = 'dying';
      setTimeout(() => { if (state === 'dying') gameOver(); }, 500);
    }
  }

  // 云层遮挡更新
  if (cloudEnabled && state === 'playing') {
    // 两朵云从屏幕外向中间滑入
    if (cloudOffsetLeft < 0) {
      cloudOffsetLeft = Math.min(cloudOffsetLeft + cloudSpeed * dt / 60, 0);
    }
    if (cloudOffsetRight > 0) {
      cloudOffsetRight = Math.max(cloudOffsetRight - cloudSpeed * dt / 60, 0);
    }
  }

  arrows.forEach(a => {
    if (!a.alive) return;
    const dx = a.targetX - a.x;
    const dy = a.targetY - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);

    if (dist < 20) {
      if (a.wrong) {
        // 错箭：随机方向弹飞，不爆炸
        const bounceAngle = Math.random() * Math.PI * 2;
        const spd = 5 + Math.random() * 4;
        deflectedArrows.push({
          x: a.targetX, y: a.targetY,
          vx: Math.cos(bounceAngle) * spd,
          vy: Math.sin(bounceAngle) * spd - 4,
          angle: a.angle,
          spin: (Math.random() - 0.5) * 0.4,
          color: a.color,
          life: 1
        });
        if (a.timePenalty) {
          // 第2关：射错只扣时间，不game over
          // 时间已在shoot函数中扣除，释放targeted让气球可被重新射击
          a.target.targeted = false;
        } else {
          // 弹飞后0.5秒显示游戏结束
          setTimeout(() => {
            if (state === 'dying') gameOver();
          }, 500);
        }
      } else if (a.shieldBreak) {
        // 破盾箭：只破盾，不爆气球，释放targeted让气球可被重新射击
        a.target.targeted = false;
      } else {
        hitBalloon(a.target, a.angle);
      }
      a.alive = false;
    } else {
      const moveDist = a.speed * dt;
      if (moveDist >= dist) {
        // 本帧就能到达目标，直接到目标点
        a.x = a.targetX;
        a.y = a.targetY;
      } else {
        a.x += (dx / dist) * moveDist;
        a.y += (dy / dist) * moveDist;
      }
    }
  });
  arrows = arrows.filter(a => a.alive);

  particles.forEach(p => {
    p.x += p.vx * dt;
    p.y += p.vy * dt;
    if (p.type === 'fragment') {
      p.vy += 0.12 * dt; // 碎片受更强重力
      p.rotation += p.rotSpeed * dt;
      p.vx *= 0.99; // 空气阻力
      p.life -= 0.025 * dt;
    } else {
      p.vy += 0.05 * dt;
      p.life -= (p.type === 'spark' ? 0.05 : 0.03) * dt;
    }
  });
  particles = particles.filter(p => p.life > 0);

  explosions.forEach(e => {
    e.radius += (e.maxRadius - e.radius) * 0.15 * dt;
    e.life -= 0.06 * dt;
  });
  explosions = explosions.filter(e => e.life > 0);

  floatTexts.forEach(ft => {
    ft.y += ft.vy * dt;
    ft.life -= 0.02 * dt;
  });
  floatTexts = floatTexts.filter(ft => ft.life > 0);

  stuckArrows.forEach(a => a.life -= dt);
  stuckArrows = stuckArrows.filter(a => a.life > 0);

  const sReplenish = getLevelStrategy();
  if (sReplenish && sReplenish.replenishBalloons) {
    sReplenish.replenishBalloons();
  } else {
    if (balloons.filter(b => b.alive).length < 8) {
      spawnBalloon();
    }
  }

  // 第17关：按钮随机移动
  if (currentLevelId === 17 && state === 'playing') {
    updateMovingButtons(dt);
  }

  // 第18关：按钮换位进度条
  if (currentLevelId === 18 && state === 'playing') {
    shuffleTimer += dt / 60; // dt=1约16.67ms，3秒≈180帧
    const shufflePeriod = 3; // 3秒换位一次
    const progress = Math.min(shuffleTimer / shufflePeriod, 1);
    const fill = document.getElementById('shuffle-bar-fill');
    if (fill) fill.style.width = (progress * 100) + '%';
    if (shuffleTimer >= shufflePeriod) {
      shuffleTimer = 0;
      shuffleButtonPositions();
    }
  }
}

// ==================== 主循环 ====================
function gameLoop(t) {
  update(t);
  ctx.clearRect(0, 0, W, H);

  drawBackground();
  drawTree();
  drawStuckArrows();
  drawFireSticks();
  balloons.forEach(b => drawBalloon(b));
  drawGear();
  drawClouds();
  drawShieldBreakEffects();
  drawLightningEffects();

  if (state === 'playing' || state === 'dying') {
    const s = getLevelStrategy();
    if (s && s.drawTargetIndicators) {
      s.drawTargetIndicators();
    } else {
      const target = getTargetBalloon();
      if (target && arrows.length === 0 && state === 'playing') {
        drawTargetIndicator(target);
      }
    }
    arrows.forEach(a => drawArrow(a));
  }

  drawExplosions();
  drawParticles();
  drawDeflectedArrows();
  drawFloatTexts();

  // 关卡9的ready倒计时文字
  if (state === 'ready' && readyPhase > 0) {
    const text = readyPhase === 4 ? '开始!' : String(4 - readyPhase);
    const progress = readyPhaseTime / 36; // 0~1
    const scale = 1 + (1 - Math.min(progress, 1)) * 0.5; // 从1.5缩到1
    const alpha = Math.min(1, 1 - Math.max(0, progress - 0.7) / 0.3); // 最后淡出
    ctx.save();
    ctx.globalAlpha = alpha;
    ctx.font = `bold ${Math.round(72 * scale)}px 'Microsoft YaHei', sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // 描边
    ctx.strokeStyle = 'rgba(0,0,0,0.6)';
    ctx.lineWidth = 6;
    ctx.strokeText(text, W / 2, H * 0.35);
    // 填充
    ctx.fillStyle = readyPhase === 4 ? '#FFD700' : '#fff';
    ctx.shadowColor = readyPhase === 4 ? 'rgba(255,215,0,0.8)' : 'rgba(255,255,255,0.5)';
    ctx.shadowBlur = 20;
    ctx.fillText(text, W / 2, H * 0.35);
    ctx.restore();
  }

  // 对战结束动画：神射手 / 禁止用脚玩
  if (versusMode && state === 'gameover' && versusLoser && versusLoser !== 'draw') {
    const elapsed = (Date.now() - versusEndAnimTime) / 1000;
    const leftWin = versusLoser === 'right';
    const winSide = leftWin ? -1 : 1;
    const loseSide = leftWin ? 1 : -1;

    // 神射手动画（胜方）- 0.5秒后出现，由小变大，有力度
    if (elapsed > 0.5) {
      const winProgress = Math.min(1, (elapsed - 0.5) / 0.6);
      // 弹性缩放：先过冲再回弹
      const elastic = winProgress < 0.6
        ? (winProgress / 0.6) * 1.3
        : 1.3 - 0.3 * ((winProgress - 0.6) / 0.4);
      const scale = Math.max(0.01, elastic);
      const alpha = Math.min(1, winProgress * 2);

      const winX = W / 2 + winSide * (W * 0.22);
      const winY = H * 0.52;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(winX, winY);
      ctx.scale(scale, scale);

      // 光芒背景
      const rayCount = 12;
      for (let i = 0; i < rayCount; i++) {
        const angle = (i / rayCount) * Math.PI * 2 + elapsed * 0.5;
        ctx.save();
        ctx.rotate(angle);
        ctx.fillStyle = `rgba(255, 215, 0, ${0.15 * alpha})`;
        ctx.beginPath();
        ctx.moveTo(-4, 0);
        ctx.lineTo(0, -60);
        ctx.lineTo(4, 0);
        ctx.fill();
        ctx.restore();
      }

      // 文字描边
      ctx.font = `bold 32px 'Microsoft YaHei', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.strokeStyle = 'rgba(139, 69, 0, 0.8)';
      ctx.lineWidth = 5;
      ctx.strokeText('神射手', 0, 0);

      // 金黄色填充+发光
      ctx.shadowColor = 'rgba(255, 215, 0, 0.9)';
      ctx.shadowBlur = 25;
      ctx.fillStyle = '#FFD700';
      ctx.fillText('神射手', 0, 0);
      // 再画一层加强发光
      ctx.shadowBlur = 15;
      ctx.fillText('神射手', 0, 0);

      ctx.restore();
    }

    // 禁止用脚玩动画（败方）- 0.8秒后出现，比神射手慢一丢丢
    if (elapsed > 0.8) {
      const loseProgress = Math.min(1, (elapsed - 0.8) / 0.8);
      // 缓慢出现，带点抖动
      const scale = 0.3 + 0.7 * loseProgress;
      const shake = loseProgress < 0.5 ? (Math.random() - 0.5) * 4 * (1 - loseProgress * 2) : 0;
      const alpha = Math.min(1, loseProgress * 1.5);

      const loseX = W / 2 + loseSide * (W * 0.22);
      const loseY = H * 0.52;

      ctx.save();
      ctx.globalAlpha = alpha;
      ctx.translate(loseX + shake, loseY);
      ctx.scale(scale, scale);

      ctx.font = `bold 20px 'Microsoft YaHei', sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';

      // 暗红色描边
      ctx.strokeStyle = 'rgba(80, 0, 0, 0.8)';
      ctx.lineWidth = 4;
      ctx.strokeText('禁止用脚玩', 0, 0);

      // 红色填充+暗淡发光
      ctx.shadowColor = 'rgba(255, 0, 0, 0.4)';
      ctx.shadowBlur = 8;
      ctx.fillStyle = '#FF3333';
      ctx.fillText('禁止用脚玩', 0, 0);

      ctx.restore();
    }
  }

  drawHUD();

  requestAnimationFrame(gameLoop);
}

// 颜色按钮统一处理（点击直接射击，idle状态自动开始）
function handleColorBtn(color, side) {
  if (btnFlipping) return; // 翻转动画中禁止操作
  if (state === 'idle') {
    // idle状态下点击=开始游戏
    startGame();
    // 前8关和关卡9首次进入：开始后直接射击
    shoot(color, side);
    return;
  } else if (state === 'gameover') {
    // gameover状态下点击=重新开始并射击
    if (Date.now() < canRestartTime) return;
    resumeGame();
    shoot(color, side);
    return;
  } else if (state === 'ready' || state === 'paused') {
    // ready/paused状态下点击无效
    return;
  }
  shoot(color, side);
}

// 键盘
document.addEventListener('keydown', (e) => {
  const s = getLevelStrategy();
  if (s && s.handleKey && s.handleKey(e.key)) {
    e.preventDefault();
  } else {
    // 第18关：键盘按位置映射（D=最左按钮，F=中间按钮，J=最右按钮）
    if (currentLevelId === 18) {
      const container = document.getElementById('game-color-btns');
      const colorBtnIds = ['btn-red', 'btn-blue', 'btn-green'];
      const visibleBtns = Array.from(container.children).filter(el =>
        colorBtnIds.includes(el.id) && el.style.display !== 'none'
      );
      if (e.key === 'd' || e.key === 'D') {
        e.preventDefault();
        if (visibleBtns[0]) visibleBtns[0].click();
      } else if (e.key === 'f' || e.key === 'F') {
        e.preventDefault();
        if (visibleBtns[1]) visibleBtns[1].click();
      } else if (e.key === 'j' || e.key === 'J') {
        e.preventDefault();
        if (visibleBtns[2]) visibleBtns[2].click();
      }
    } else {
      if (e.key === 'd' || e.key === 'D') { e.preventDefault(); handleColorBtn(RED); }
      else if (e.key === 'f' || e.key === 'F') { e.preventDefault(); handleColorBtn(BLUE); }
      else if (e.key === 'j' || e.key === 'J') { e.preventDefault(); const kl = findLevel(currentLevelId); if (kl && kl.colors >= 3) handleColorBtn(GREEN); }
      else if (e.key === 'k' || e.key === 'K') { e.preventDefault(); const kl2 = findLevel(currentLevelId); if (kl2 && kl2.colors >= 4) handleColorBtn(YELLOW); }
    }
  }
});

function updateLevelDataUnlocked() {
  levelData.forEach(module => {
    module.levels.forEach(level => {
      level.unlocked = level.id <= maxUnlockedLevel;
    });
  });
}

function showLevelModal() {
  document.getElementById('level-modal').style.display = 'block';
  renderModuleTabs();
  renderLevelList();
}

function hideLevelModal() {
  document.getElementById('level-modal').style.display = 'none';
}

function renderModuleTabs() {
  const tabs = document.querySelectorAll('.module-tab');
  tabs.forEach((tab, i) => {
    if (i === currentModule) {
      tab.style.color = '#FFD700';
      tab.style.borderBottomColor = '#FFD700';
      tab.classList.add('active');
    } else {
      tab.style.color = '#888';
      tab.style.borderBottomColor = 'transparent';
      tab.classList.remove('active');
    }
  });
}

function renderLevelList() {
  const container = document.getElementById('level-list');
  const module = levelData[currentModule];

  let html = '';
  module.levels.forEach(level => {
    const lockedClass = level.unlocked ? '' : 'locked';
    const statusText = level.unlocked ? '可挑战' : '未解锁';
    const statusColor = level.unlocked ? '#4CAF50' : '#666';

    const badgeColors = { 2: '#3D9EFF', 3: '#4CAF50', 4: '#FF9800' };
    const badgeColor = badgeColors[level.colors] || '#aaa';
    const badgeText = level.versus ? '对战' : (level.combo ? `${level.colors}色` : `${level.colors}色`);
    const comboBadgeColor = level.versus ? '#FF5252' : (level.combo ? (level.colors === 4 ? '#FF6D00' : '#E040FB') : badgeColor);

    html += `
      <div class="level-card ${lockedClass}" data-level-id="${level.id}" onclick="selectLevel(${level.id}, ${level.unlocked}, event)">
        <div class="level-num">${level.id}</div>
        <div class="level-badge" style="background:${comboBadgeColor}">${badgeText}</div>
        <div class="level-info">
          <div class="level-name">${level.name}</div>
          <div class="level-desc">${level.desc}</div>
        </div>
        <div class="level-status" style="color:${statusColor}">${statusText}</div>
      </div>
    `;
  });

  container.innerHTML = html;
}

function selectLevel(id, unlocked, event) {
  if (!unlocked) {
    alert('该关卡尚未解锁！');
    return;
  }

  if (event) event.stopPropagation();

  currentLevelId = id;
  lastPlayedLevel = id;
  localStorage.setItem('arrow_lastLevel', id.toString());
  versusMode = false;
  leftScore = 0;
  rightScore = 0;
  versusLoser = null;

  document.getElementById('level-modal').style.display = 'none';
  document.getElementById('gameover-popup').style.display = 'none';
  document.getElementById('versus-result').style.display = 'none';
  document.getElementById('final-score').style.display = '';
  document.getElementById('final-info').style.display = '';
  showStartUI(true);
  document.getElementById('start-text').textContent = '点击开始';
  score = 0;
  state = 'idle';
  updateColorButtons();
  initScene();
}

// 音乐/音效开关
let musicEnabled = true, sfxEnabled = true;

// ==================== 音频系统 ====================
let audioCtx = null;
let currentBgm = null;
let bgmGain = null;

function initAudio() {
  if (audioCtx) return;
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  bgmGain = audioCtx.createGain();
  bgmGain.gain.value = 0.15;
  bgmGain.connect(audioCtx.destination);
}

// 气泡爆裂音效参数（1-100范围，默认50）
let sfxPitch = 50, sfxBubble = 50, sfxVol = 50, sfxDur = 50;

// 气泡爆裂音效
function playBubblePop() {
  if (!sfxEnabled) return;
  initAudio();
  const now = audioCtx.currentTime;

  // 从滑块值映射到实际参数
  const pitch = sfxPitch / 100;        // 0.01-1.0, 越高音调越高
  const bubble = sfxBubble / 100;       // 0.01-1.0, 越高水泡感越强
  const vol = sfxVol / 100;             // 0.01-1.0, 音量
  const dur = sfxDur / 100;             // 0.01-1.0, 持续时间

  const baseFreq = 300 + pitch * 1500;  // 300-1800Hz
  const endFreq = 100 + pitch * 300;    // 100-400Hz
  const mainDur = 0.05 + dur * 0.2;     // 0.05-0.25秒
  const mainVol = 0.03 + vol * 0.2;     // 0.03-0.23

  // 主气泡音：快速频率下滑的正弦波
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(baseFreq, now);
  osc.frequency.exponentialRampToValueAtTime(endFreq, now + mainDur);
  gain.gain.setValueAtTime(mainVol, now);
  gain.gain.exponentialRampToValueAtTime(0.001, now + mainDur + 0.04);
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.start(now);
  osc.stop(now + mainDur + 0.04);

  // 气泡泛音：更高频的短促音
  const osc2 = audioCtx.createOscillator();
  const gain2 = audioCtx.createGain();
  osc2.type = 'sine';
  osc2.frequency.setValueAtTime(baseFreq * 1.5, now);
  osc2.frequency.exponentialRampToValueAtTime(endFreq * 1.5, now + mainDur * 0.7);
  gain2.gain.setValueAtTime(mainVol * 0.5, now);
  gain2.gain.exponentialRampToValueAtTime(0.001, now + mainDur * 0.7 + 0.02);
  osc2.connect(gain2);
  gain2.connect(audioCtx.destination);
  osc2.start(now);
  osc2.stop(now + mainDur * 0.7 + 0.02);

  // 水泡质感：噪声爆发（受bubble参数控制）
  if (bubble > 0.1) {
    const noiseDur = 0.02 + bubble * 0.08;
    const bufferSize = Math.floor(audioCtx.sampleRate * noiseDur);
    const buffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate);
    const data = buffer.getChannelData(0);
    for (let i = 0; i < bufferSize; i++) {
      data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (bufferSize * (0.1 + bubble * 0.2)));
    }
    const noise = audioCtx.createBufferSource();
    noise.buffer = buffer;
    const noiseGain = audioCtx.createGain();
    noiseGain.gain.setValueAtTime(mainVol * bubble * 0.5, now);
    noiseGain.gain.exponentialRampToValueAtTime(0.001, now + noiseDur);
    const filter = audioCtx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = 800 + bubble * 3000;
    filter.Q.value = 1 + bubble * 3;
    noise.connect(filter);
    filter.connect(noiseGain);
    noiseGain.connect(audioCtx.destination);
    noise.start(now);
    noise.stop(now + noiseDur);
  }
}

// 背景音乐生成器
const bgmGenerators = [
  // 1. 舒缓星空 - 慢速琶音
  function createBgm1(ctx, dest) {
    const notes = [261.63, 329.63, 392.00, 523.25, 392.00, 329.63]; // C4 E4 G4 C5 G4 E4
    const bassNotes = [130.81, 164.81, 196.00, 130.81]; // C3 E3 G3 C3
    let noteIdx = 0, bassIdx = 0;
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(dest);

    function playNote() {
      if (!musicEnabled || !audioCtx) return;
      const now = ctx.currentTime;
      // 琶音
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = notes[noteIdx % notes.length];
      g.gain.setValueAtTime(0.3, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 1.2);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now);
      osc.stop(now + 1.2);
      noteIdx++;

      // 低音（每4个音一次）
      if (noteIdx % 4 === 0) {
        const bOsc = ctx.createOscillator();
        const bG = ctx.createGain();
        bOsc.type = 'triangle';
        bOsc.frequency.value = bassNotes[bassIdx % bassNotes.length];
        bG.gain.setValueAtTime(0.2, now);
        bG.gain.exponentialRampToValueAtTime(0.001, now + 2.5);
        bOsc.connect(bG);
        bG.connect(masterGain);
        bOsc.start(now);
        bOsc.stop(now + 2.5);
        bassIdx++;
      }
    }
    const interval = setInterval(playNote, 600);
    return { stop: () => clearInterval(interval), masterGain };
  },

  // 2. 轻快森林 - 中速跳跃旋律
  function createBgm2(ctx, dest) {
    const melody = [392, 440, 494, 523, 494, 440, 392, 330, 392, 440, 523, 587, 523, 494, 440, 392];
    let idx = 0;
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.4;
    masterGain.connect(dest);

    function playNote() {
      if (!musicEnabled || !audioCtx) return;
      const now = ctx.currentTime;
      const freq = melody[idx % melody.length];
      // 主旋律
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'triangle';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.25, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.4);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now);
      osc.stop(now + 0.4);

      // 和声垫底（每2个音）
      if (idx % 2 === 0) {
        const pad = ctx.createOscillator();
        const pg = ctx.createGain();
        pad.type = 'sine';
        pad.frequency.value = freq * 0.5;
        pg.gain.setValueAtTime(0.1, now);
        pg.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
        pad.connect(pg);
        pg.connect(masterGain);
        pad.start(now);
        pad.stop(now + 0.8);
      }
      idx++;
    }
    const interval = setInterval(playNote, 300);
    return { stop: () => clearInterval(interval), masterGain };
  },

  // 3. 深空冥想 - 极慢和弦铺底
  function createBgm3(ctx, dest) {
    const chords = [
      [130.81, 164.81, 196.00], // C E G
      [146.83, 174.61, 220.00], // D F A
      [164.81, 196.00, 246.94], // E G B
      [130.81, 155.56, 196.00], // C Eb G
    ];
    let chordIdx = 0;
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.6;
    masterGain.connect(dest);

    function playChord() {
      if (!musicEnabled || !audioCtx) return;
      const now = ctx.currentTime;
      const chord = chords[chordIdx % chords.length];
      chord.forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.15, now);
        g.gain.setValueAtTime(0.15, now + 2.5);
        g.gain.exponentialRampToValueAtTime(0.001, now + 4);
        osc.connect(g);
        g.connect(masterGain);
        osc.start(now);
        osc.stop(now + 4);

        // 高八度泛音
        const osc2 = ctx.createOscillator();
        const g2 = ctx.createGain();
        osc2.type = 'sine';
        osc2.frequency.value = freq * 2;
        g2.gain.setValueAtTime(0.05, now);
        g2.gain.exponentialRampToValueAtTime(0.001, now + 3);
        osc2.connect(g2);
        g2.connect(masterGain);
        osc2.start(now);
        osc2.stop(now + 3);
      });
      chordIdx++;
    }
    playChord();
    const interval = setInterval(playChord, 3500);
    return { stop: () => clearInterval(interval), masterGain };
  },

  // 4. 活力节拍 - 快节奏短音
  function createBgm4(ctx, dest) {
    const scale = [261.63, 293.66, 329.63, 349.23, 392.00, 440.00, 493.88, 523.25];
    let idx = 0;
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.35;
    masterGain.connect(dest);

    function playNote() {
      if (!musicEnabled || !audioCtx) return;
      const now = ctx.currentTime;
      // 随机选音阶内的音
      const freq = scale[Math.floor(Math.random() * scale.length)];
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'square';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0.08, now);
      g.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
      osc.connect(g);
      g.connect(masterGain);
      osc.start(now);
      osc.stop(now + 0.15);

      // 低音鼓点（每4拍）
      if (idx % 4 === 0) {
        const kick = ctx.createOscillator();
        const kg = ctx.createGain();
        kick.type = 'sine';
        kick.frequency.setValueAtTime(150, now);
        kick.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        kg.gain.setValueAtTime(0.3, now);
        kg.gain.exponentialRampToValueAtTime(0.001, now + 0.15);
        kick.connect(kg);
        kg.connect(masterGain);
        kick.start(now);
        kick.stop(now + 0.15);
      }
      idx++;
    }
    const interval = setInterval(playNote, 200);
    return { stop: () => clearInterval(interval), masterGain };
  },

  // 5. 温柔钢琴 - 慢速五度音程
  function createBgm5(ctx, dest) {
    const patterns = [
      [261.63, 392.00], [293.66, 440.00], [329.63, 493.88], [349.23, 523.25],
      [329.63, 493.88], [293.66, 440.00],
    ];
    let idx = 0;
    const masterGain = ctx.createGain();
    masterGain.gain.value = 0.5;
    masterGain.connect(dest);

    function playNote() {
      if (!musicEnabled || !audioCtx) return;
      const now = ctx.currentTime;
      const [f1, f2] = patterns[idx % patterns.length];
      // 双音
      [f1, f2].forEach(freq => {
        const osc = ctx.createOscillator();
        const g = ctx.createGain();
        osc.type = 'sine';
        osc.frequency.value = freq;
        g.gain.setValueAtTime(0.15, now);
        g.gain.setValueAtTime(0.15, now + 0.8);
        g.gain.exponentialRampToValueAtTime(0.001, now + 1.8);
        osc.connect(g);
        g.connect(masterGain);
        osc.start(now);
        osc.stop(now + 1.8);
      });
      idx++;
    }
    const interval = setInterval(playNote, 900);
    return { stop: () => clearInterval(interval), masterGain };
  },
];

function startBgm() {
  if (!musicEnabled) return;
  initAudio();
  stopBgm();
  const genIdx = Math.floor(Math.random() * bgmGenerators.length);
  currentBgm = bgmGenerators[genIdx](audioCtx, bgmGain);
}

function stopBgm() {
  if (currentBgm) {
    currentBgm.stop();
    currentBgm = null;
  }
}

  valSpan.textContent = cloudSpeed;

// 主题数据
const themeData = {
  arrow: [
    { id: 'arrow_classic', name: '木箭', icon: '🏹' },
    { id: 'arrow_fire', name: '火箭', icon: '🔥' },
    { id: 'arrow_lightning', name: '电箭', icon: '🔱' },
    { id: 'arrow_pure_lightning', name: '电棍', icon: '🌩️' },
    { id: 'arrow_air', name: '空气箭', icon: '💨' },
    { id: 'arrow_transparent', name: '透明箭', icon: '✨' },
    { id: 'arrow_lightning_bolt', name: '闪电', icon: '⚡' },
  ],
  bg: [
    { id: 'bg_deepspace', name: '深空', icon: '🌌' },
    { id: 'bg_sunset', name: '黄昏', icon: '🌅' },
    { id: 'bg_sakura', name: '樱花', icon: '🌸' },
  ]
};
let currentThemeCat = 'arrow';
let currentThemes = { arrow: 'arrow_classic', bg: 'bg_deepspace' };

function showThemeModal(cat) {
  if (cat) currentThemeCat = cat;
  // 更新标签栏样式
  document.querySelectorAll('.theme-tab').forEach(tab => {
    const isActive = tab.dataset.cat === currentThemeCat;
    tab.style.color = isActive ? '#FFD700' : '#888';
    tab.style.borderBottom = isActive ? '3px solid #FFD700' : '3px solid transparent';
  });
  const list = document.getElementById('theme-list');
  list.innerHTML = '';
  list.style.display = 'grid';
  list.style.gridTemplateColumns = 'repeat(3, 1fr)';
  list.style.gap = '12px';
  list.style.padding = '15px';
  list.style.alignContent = 'start';
  const items = themeData[currentThemeCat] || [];
  items.forEach(t => {
    const selected = currentThemes[currentThemeCat] === t.id;
    const card = document.createElement('div');
    card.style.cssText = `background:${selected ? 'rgba(255,215,0,0.15)' : 'rgba(255,255,255,0.05)'}; border:2px solid ${selected ? '#FFD700' : 'rgba(255,255,255,0.1)'}; border-radius:12px; padding:14px 6px; cursor:pointer; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:8px; transition:0.2s; min-height:90px;`;
    card.innerHTML = `<span style="font-size:32px;">${t.icon}</span><span style="color:${selected ? '#FFD700' : '#ccc'}; font-size:13px; font-weight:bold; text-align:center; line-height:1.2;">${t.name}</span>`;
    card.addEventListener('click', () => {
      currentThemes[currentThemeCat] = t.id;
      showThemeModal();
    });
    list.appendChild(card);
  });
  document.getElementById('theme-modal').style.display = 'block';
}

// 主题标签切换
document.querySelectorAll('.theme-tab').forEach(tab => {
  tab.addEventListener('click', () => showThemeModal(tab.dataset.cat));
});
