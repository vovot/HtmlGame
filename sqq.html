<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>弓箭射气球</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; user-select: none; -webkit-user-select: none; }
html, body { width: 100%; height: 100%; overflow: hidden; font-family: 'Microsoft YaHei', sans-serif; background: #111; display: flex; justify-content: center; align-items: center; }
#game-container { position: relative; width: 390px; height: 844px; max-width: 100vw; max-height: 100vh; overflow: hidden; background: #000; }
canvas { display: block; position: absolute; top: 0; left: 0; z-index: 1; pointer-events: none; width: 100%; height: 100%; }
#gameover-popup { position: absolute; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.85); border-radius: 16px; padding: 20px 30px; text-align: center; z-index: 100; display: none; min-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.1); pointer-events: none; }
#gameover-popup > * { pointer-events: auto; }
#gameover-popup h2 { color: #FF5252; font-size: 28px; margin-bottom: 8px; }
#gameover-popup .score-text { color: #FFD700; font-size: 22px; margin-bottom: 5px; }
#gameover-popup .info-text { color: #aaa; font-size: 16px; margin-bottom: 15px; }
#float-start { position: absolute; top: 55%; left: 50%; transform: translate(-50%,-50%); z-index: 200; pointer-events: auto; animation: float 2s ease-in-out infinite; white-space: nowrap; }
#start-text { color: #fff; font-size: 28px; font-weight: bold; text-shadow: 0 0 20px rgba(255,152,0,0.8), 0 0 40px rgba(255,152,0,0.4); letter-spacing: 8px; cursor: pointer; }
#btn-level { position: absolute; top: 55%; right: 20px; transform: translateY(-50%); z-index: 200; background: linear-gradient(135deg, rgba(124,77,255,0.9), rgba(101,31,255,0.9)); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; font-size: 14px; font-weight: bold; font-family: 'Microsoft YaHei', sans-serif; border-radius: 20px; cursor: pointer; box-shadow: 0 2px 12px rgba(124,77,255,0.5), inset 0 1px 0 rgba(255,255,255,0.2); backdrop-filter: blur(4px); transition: transform 0.1s, box-shadow 0.2s; letter-spacing: 2px; }
#btn-level:active { transform: translateY(-50%) scale(0.95); }
#btn-theme { position: absolute; top: 55%; left: 20px; transform: translateY(-50%); z-index: 200; background: linear-gradient(135deg, rgba(255,152,0,0.9), rgba(230,81,0,0.9)); color: #fff; border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; font-size: 14px; font-weight: bold; font-family: 'Microsoft YaHei', sans-serif; border-radius: 20px; cursor: pointer; box-shadow: 0 2px 12px rgba(255,152,0,0.5), inset 0 1px 0 rgba(255,255,255,0.2); backdrop-filter: blur(4px); transition: transform 0.1s, box-shadow 0.2s; letter-spacing: 2px; }
#btn-theme:active { transform: translateY(-50%) scale(0.95); }
#btn-pause { position: absolute; top: 15px; left: 15px; z-index: 200; background: rgba(0,0,0,0.5); color: #fff; border: 1px solid rgba(255,255,255,0.2); width: 40px; height: 40px; font-size: 22px; line-height: 1; border-radius: 10px; cursor: pointer; display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px); transition: transform 0.1s; }
#btn-pause:active { transform: scale(0.9); }
@keyframes float { 0%, 100% { transform: translate(-50%,-50%) translateY(0); } 50% { transform: translate(-50%,-50%) translateY(-12px); } }
@keyframes btnFlip { 0% { transform: perspective(400px) rotateY(0deg); } 50% { transform: perspective(400px) rotateY(90deg); } 100% { transform: perspective(400px) rotateY(0deg); } }
#game-color-btns { position: absolute; bottom: 10px; left: 0; width: 100%; display: flex; justify-content: space-around; align-items: flex-end; z-index: 200; pointer-events: auto; }
#game-color-btns.v-layout { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: auto auto; justify-items: center; align-items: end; row-gap: 12px; }
#game-color-btns.v-layout #btn-red { grid-column: 1; grid-row: 1; }
#game-color-btns.v-layout #btn-blue { grid-column: 2; grid-row: 2; }
#game-color-btns.v-layout #btn-green { grid-column: 3; grid-row: 2; }
#game-color-btns.v-layout #btn-yellow { grid-column: 4; grid-row: 1; }
#game-color-btns.split-layout { display: grid; grid-template-columns: 1fr 1fr 1fr 1fr; grid-template-rows: auto auto; justify-items: center; align-items: end; row-gap: 12px; column-gap: 8px; }
#game-color-btns.split-layout #btn-left-red { grid-column: 1; grid-row: 1; }
#game-color-btns.split-layout #btn-left-blue { grid-column: 2; grid-row: 2; }
#game-color-btns.split-layout #btn-right-blue { grid-column: 3; grid-row: 2; }
#game-color-btns.split-layout #btn-right-red { grid-column: 4; grid-row: 1; }
#game-color-btns.split-layout #btn-right-green { grid-column: 4; grid-row: 2; }
#game-color-btns.split3-layout { display: grid; grid-template-columns: 1fr 1fr; grid-template-rows: auto auto auto; justify-items: center; align-items: end; row-gap: 8px; column-gap: 30px; }
#game-color-btns.split3-layout #btn-left-red { grid-column: 1; grid-row: 1; }
#game-color-btns.split3-layout #btn-left-blue { grid-column: 1; grid-row: 2; }
#game-color-btns.split3-layout #btn-left-green { grid-column: 1; grid-row: 3; }
#game-color-btns.split3-layout #btn-right-red { grid-column: 2; grid-row: 1; }
#game-color-btns.split3-layout #btn-right-blue { grid-column: 2; grid-row: 2; }
#game-color-btns.split3-layout #btn-right-green { grid-column: 2; grid-row: 3; }
#btn-left-red::after, #btn-left-blue::after, #btn-left-green::after { content: '←'; position: absolute; top: -6px; right: -4px; font-size: 12px; color: #fff; text-shadow: 0 0 4px #000; }
#btn-right-red::after, #btn-right-blue::after, #btn-right-green::after { content: '→'; position: absolute; top: -6px; left: -4px; font-size: 12px; color: #fff; text-shadow: 0 0 4px #000; }
.color-btn { width: 70px; height: 70px; border-radius: 50%; border: 3px solid rgba(255,255,255,0.5); color: #fff; font-size: 18px; font-weight: bold; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: transform 0.1s; box-shadow: 0 4px 15px rgba(0,0,0,0.3); position: relative; }
.color-btn:active { transform: scale(0.9); }
.color-btn-red { background: radial-gradient(circle at 35% 35%, #FF8080, #CC0000); }
.color-btn-blue { background: radial-gradient(circle at 35% 35%, #80C0FF, #0066CC); }
.color-btn-green { background: radial-gradient(circle at 35% 35%, #81C784, #2E7D32); }
.color-btn-yellow { background: radial-gradient(circle at 35% 35%, #FFE082, #F9A825); }
.module-tab:hover { background: rgba(255,255,255,0.05); }
.level-card { background: linear-gradient(135deg, #2a2a4a, #1e1e3a); border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; cursor: pointer; transition: transform 0.15s, box-shadow 0.15s; border: 1px solid rgba(255,255,255,0.08); display: flex; align-items: center; gap: 12px; }
.level-card:hover { transform: translateY(-2px); box-shadow: 0 4px 15px rgba(0,0,0,0.3); border-color: rgba(255,215,0,0.3); }
.level-card:active { transform: scale(0.98); }
.level-card.locked { opacity: 0.5; cursor: not-allowed; }
.level-num { width: 36px; height: 36px; border-radius: 50%; background: linear-gradient(135deg, #FF9800, #F57C00); color: #fff; font-weight: bold; font-size: 16px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.level-badge { padding: 4px 10px; border-radius: 12px; color: #fff; font-weight: bold; font-size: 13px; flex-shrink: 0; text-align: center; min-width: 40px; }
.level-info { flex: 1; }
.level-name { color: #fff; font-size: 16px; font-weight: bold; margin-bottom: 3px; }
.level-desc { color: #aaa; font-size: 12px; }
.level-status { color: #4CAF50; font-size: 12px; flex-shrink: 0; }
.level-card.locked .level-num { background: #555; }
.level-card.locked .level-badge { opacity: 0.5; }
</style>
</head>
<body>
<div id="game-container">
<canvas id="c"></canvas>

<div id="gameover-popup">
  <h2>游戏结束</h2>
  <div class="score-text" id="final-score">得分: 0</div>
  <div class="info-text" id="final-info">高度: 0m | 最高连击: 0</div>
  <div id="versus-result" style="display:none;">
    <div style="display:flex; justify-content:space-between; gap:20px; margin-bottom:10px;">
      <div id="versus-left" style="text-align:center; flex:1;"></div>
      <div id="versus-right" style="text-align:center; flex:1;"></div>
    </div>
  </div>
</div>

<div id="float-start">
  <span id="start-text">点击开始</span>
</div>
<!-- 1秒倒计时进度条 -->
<div id="countdown-bar" style="display:none; position:absolute; top:72%; left:50%; transform:translateX(-50%); z-index:200; width:50%; max-width:250px; height:10px; background:rgba(255,255,255,0.2); border-radius:5px; overflow:hidden;">
  <div id="countdown-bar-fill" style="width:100%; height:100%; border-radius:5px; background:linear-gradient(90deg, #4CAF50, #81C784); transition:none;"></div>
</div>
<!-- 第18关换位进度条 -->
<div id="shuffle-bar" style="display:none; position:absolute; top:68%; left:50%; transform:translateX(-50%); z-index:200; width:60%; max-width:300px; height:10px; background:rgba(255,255,255,0.2); border-radius:5px; overflow:hidden;">
  <div id="shuffle-bar-fill" style="width:0%; height:100%; border-radius:5px; background:linear-gradient(90deg, #4fc3f7, #ff7043);"></div>
  <div style="position:absolute; right:2px; top:-2px; width:0; height:0; border-top:7px solid transparent; border-bottom:7px solid transparent; border-right:8px solid #ff7043;"></div>
  <div style="position:absolute; left:2px; top:-2px; width:0; height:0; border-top:7px solid transparent; border-bottom:7px solid transparent; border-left:8px solid #4fc3f7;"></div>
</div>
<button id="btn-theme">主题</button>
<button id="btn-level">选关</button>
<button id="btn-pause" style="display:flex;">&#9776;</button>

<!-- 游戏颜色按钮 -->
<div id="game-color-btns">
  <button class="color-btn color-btn-red" id="btn-red">红</button>
  <button class="color-btn color-btn-blue" id="btn-blue">蓝</button>
  <button class="color-btn color-btn-green" id="btn-green" style="display:none;">绿</button>
  <button class="color-btn color-btn-yellow" id="btn-yellow" style="display:none;">黄</button>
  <!-- 关卡9专用：左右分区按钮 -->
  <button class="color-btn color-btn-red" id="btn-left-red" style="display:none;">红</button>
  <button class="color-btn color-btn-blue" id="btn-left-blue" style="display:none;">蓝</button>
  <button class="color-btn color-btn-green" id="btn-left-green" style="display:none;">绿</button>
  <button class="color-btn color-btn-red" id="btn-right-red" style="display:none;">红</button>
  <button class="color-btn color-btn-blue" id="btn-right-blue" style="display:none;">蓝</button>
  <button class="color-btn color-btn-green" id="btn-right-green" style="display:none;">绿</button>
</div>

<!-- 暂停弹窗 -->
<div id="pause-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:400; background:rgba(0,0,0,0.7);">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1a1a2e; border-radius:16px; width:85%; max-width:320px; padding:30px 20px; border:1px solid rgba(255,255,255,0.15); text-align:center;">
    <div style="color:#FFD700; font-size:22px; font-weight:bold; margin-bottom:24px; letter-spacing:4px;">暂停</div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:18px; padding:0 10px;">
      <span style="color:#ccc; font-size:16px;">音乐</span>
      <label style="position:relative; width:50px; height:26px; cursor:pointer;">
        <input type="checkbox" id="toggle-music" checked style="display:none;">
        <span id="music-slider" style="position:absolute; inset:0; background:#444; border-radius:13px; transition:0.3s;"></span>
        <span id="music-dot" style="position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:0.3s;"></span>
      </label>
    </div>
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding:0 10px;">
      <span style="color:#ccc; font-size:16px;">音效</span>
      <label style="position:relative; width:50px; height:26px; cursor:pointer;">
        <input type="checkbox" id="toggle-sfx" checked style="display:none;">
        <span id="sfx-slider" style="position:absolute; inset:0; background:#444; border-radius:13px; transition:0.3s;"></span>
        <span id="sfx-dot" style="position:absolute; top:3px; left:3px; width:20px; height:20px; background:#fff; border-radius:50%; transition:0.3s;"></span>
      </label>
    </div>
    <!-- UI位置设置 -->
    <div style="border-top:1px solid #333; padding-top:14px; margin-bottom:14px;">
      <div style="color:#FFD700; font-size:14px; font-weight:bold; margin-bottom:10px; letter-spacing:1px;">开始按钮高度</div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px; margin-bottom:2px;"><span>距底部像素</span><span id="startpos-val">--</span></div>
        <input type="range" id="start-position" min="80" max="600" value="280" style="width:100%; accent-color:#FFD700;">
      </div>
    </div>
    <!-- 云朵速度设置 -->
    <div style="border-top:1px solid #333; padding-top:14px; margin-bottom:14px;">
      <div style="color:#FFD700; font-size:14px; font-weight:bold; margin-bottom:10px; letter-spacing:1px;">云朵速度</div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px; margin-bottom:2px;"><span>像素/秒</span><span id="cloudspeed-val">--</span></div>
        <input type="range" id="cloud-speed" min="5" max="60" value="18" style="width:100%; accent-color:#FFD700;">
      </div>
    </div>
    <!-- 音效调试面板 -->
    <div style="border-top:1px solid #333; padding-top:14px; margin-bottom:14px;">
      <div style="color:#FFD700; font-size:14px; font-weight:bold; margin-bottom:10px; letter-spacing:1px;">气泡音调试</div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px; margin-bottom:2px;"><span>音调高低</span><span id="pitch-val">50</span></div>
        <input type="range" id="sfx-pitch" min="1" max="100" value="50" style="width:100%; accent-color:#FFD700;">
      </div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px; margin-bottom:2px;"><span>水泡感</span><span id="bubble-val">50</span></div>
        <input type="range" id="sfx-bubble" min="1" max="100" value="50" style="width:100%; accent-color:#FFD700;">
      </div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px; margin-bottom:2px;"><span>音量</span><span id="vol-val">50</span></div>
        <input type="range" id="sfx-vol" min="1" max="100" value="50" style="width:100%; accent-color:#FFD700;">
      </div>
      <div style="margin-bottom:8px;">
        <div style="display:flex; justify-content:space-between; color:#aaa; font-size:12px; margin-bottom:2px;"><span>持续时间</span><span id="dur-val">50</span></div>
        <input type="range" id="sfx-dur" min="1" max="100" value="50" style="width:100%; accent-color:#FFD700;">
      </div>
      <button id="btn-test-pop" style="width:100%; padding:10px; background:linear-gradient(135deg,#2196F3,#1565C0); color:#fff; border:none; border-radius:10px; font-size:15px; font-weight:bold; cursor:pointer; letter-spacing:1px;">试听气泡音</button>
    </div>
    <button id="btn-resume" style="width:100%; padding:12px; background:linear-gradient(135deg,#4CAF50,#388E3C); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:bold; cursor:pointer; margin-bottom:12px; letter-spacing:2px;">继续游戏</button>
    <button id="btn-home" style="width:100%; padding:12px; background:linear-gradient(135deg,#FF5252,#D32F2F); color:#fff; border:none; border-radius:12px; font-size:17px; font-weight:bold; cursor:pointer; letter-spacing:2px;">返回主页</button>
  </div>
</div>

<!-- 主题选择弹窗 -->
<div id="theme-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:300; background:rgba(0,0,0,0.7);">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1a1a2e; border-radius:16px; width:90%; max-width:400px; height:580px; overflow:hidden; display:flex; flex-direction:column; border:1px solid rgba(255,255,255,0.15);">
    <div id="theme-tabs" style="display:flex; background:#12122a; border-bottom:2px solid #333;">
      <div class="theme-tab active" data-cat="arrow" style="flex:1; padding:12px 8px; text-align:center; color:#FFD700; font-weight:bold; font-size:14px; cursor:pointer; border-bottom:3px solid #FFD700;">弓箭</div>
      <div class="theme-tab" data-cat="bg" style="flex:1; padding:12px 8px; text-align:center; color:#888; font-weight:bold; font-size:14px; cursor:pointer; border-bottom:3px solid transparent;">背景</div>
    </div>
    <div id="theme-list" style="flex:1; overflow-y:auto; padding:15px;">
      <!-- 动态填充 -->
    </div>
    <div style="padding:12px 20px; border-top:1px solid #333;">
      <button id="confirm-theme" style="width:100%; padding:12px; background:linear-gradient(135deg, #FFD700, #FFA000); color:#1a1a2e; font-size:16px; font-weight:bold; border:none; border-radius:10px; cursor:pointer; letter-spacing:2px;">确定</button>
    </div>
  </div>
</div>

<!-- 关卡选择弹窗 -->
<div id="level-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; z-index:300; background:rgba(0,0,0,0.7);">
  <div style="position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); background:#1a1a2e; border-radius:16px; width:90%; max-width:400px; height:580px; overflow:hidden; display:flex; flex-direction:column; border:1px solid rgba(255,255,255,0.15);">

    <!-- 顶部标签栏 -->
    <div id="module-tabs" style="display:flex; background:#12122a; border-bottom:2px solid #333;">
      <div class="module-tab active" data-module="0" style="flex:1; padding:10px 6px; text-align:center; color:#FFD700; font-weight:bold; font-size:12px; cursor:pointer; border-bottom:3px solid #FFD700;">初出茅庐</div>
      <div class="module-tab" data-module="1" style="flex:1; padding:10px 6px; text-align:center; color:#888; font-weight:bold; font-size:12px; cursor:pointer; border-bottom:3px solid transparent;">阴阳合击</div>
      <div class="module-tab" data-module="2" style="flex:1; padding:10px 6px; text-align:center; color:#888; font-weight:bold; font-size:12px; cursor:pointer; border-bottom:3px solid transparent;">强者挑战</div>
      <div class="module-tab" data-module="3" style="flex:1; padding:10px 6px; text-align:center; color:#888; font-weight:bold; font-size:12px; cursor:pointer; border-bottom:3px solid transparent;">双人对战</div>
      <div class="module-tab" data-module="4" style="flex:1; padding:10px 6px; text-align:center; color:#888; font-weight:bold; font-size:12px; cursor:pointer; border-bottom:3px solid transparent;">待定</div>
    </div>

    <!-- 关卡列表区域 -->
    <div id="level-list" style="flex:1; overflow-y:auto; padding:15px;">
      <!-- 动态填充 -->
    </div>

    <!-- 关闭按钮 -->
    <div style="padding:12px; text-align:center; border-top:1px solid #333;">
      <button id="close-level-modal" style="padding:10px 40px; background:#555; color:#fff; border:none; border-radius:20px; font-size:16px; cursor:pointer;">关闭</button>
    </div>

  </div>
</div>
</div>

<script>
// 开始按钮位置设置
let customStartPosFromBottom = parseInt(localStorage.getItem('arrow_startPosBottom') || '280'); // 距底部像素

// 统一控制开始区域和选关按钮的显示/隐藏
function showStartUI(show) {
  const v = show ? 'flex' : 'none';
  document.getElementById('float-start').style.display = v;
  document.getElementById('btn-level').style.display = show ? 'inline-block' : 'none';
  document.getElementById('btn-theme').style.display = show ? 'inline-block' : 'none';
  // 第18关进度条：游戏进行中显示
  document.getElementById('shuffle-bar').style.display = (!show && currentLevelId === 18) ? 'block' : 'none';
  // 1秒倒计时进度条：游戏进行中且countdownMode===1时显示
  document.getElementById('countdown-bar').style.display = (!show && countdownMode === 1) ? 'block' : 'none';

  // 动态调整"点击开始"位置
  if (show) {
    const topPos = H - customStartPosFromBottom;
    document.getElementById('float-start').style.top = topPos + 'px';
    document.getElementById('btn-level').style.top = topPos + 'px';
    document.getElementById('btn-theme').style.top = topPos + 'px';
  }
  // btn-pause 全程显示，不在此控制
}

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const container = document.getElementById('game-container');

let W, H;
function resize() {
  const dpr = window.devicePixelRatio || 1;
  W = container.clientWidth;
  H = container.clientHeight;
  canvas.width = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';
  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  // 屏幕变化时重新计算"点击开始"位置
  const floatEl = document.getElementById('float-start');
  if (floatEl && floatEl.style.display === 'flex') showStartUI(true);
}
window.addEventListener('resize', resize);
resize();

// 根据关卡ID查找关卡配置
function findLevel(id) {
  for (const mod of levelData) {
    const lvl = mod.levels.find(l => l.id === id);
    if (lvl) return lvl;
  }
  return null;
}

// 重置所有动态数组
function resetArrays() {
  arrows = []; particles = []; floatTexts = []; stuckArrows = []; explosions = []; deflectedArrows = [];
  pendingComboColors = [];
  comboTarget = null;
  if (comboTimer) { clearTimeout(comboTimer); comboTimer = null; }
  pendingComboLeft = [];
  pendingComboRight = [];
  comboTargetLeft = null;
  comboTargetRight = null;
  if (comboTimerLeft) { clearTimeout(comboTimerLeft); comboTimerLeft = null; }
  if (comboTimerRight) { clearTimeout(comboTimerRight); comboTimerRight = null; }
  shieldBreakEffects = [];
  skippedBombs = new Set();
  pairPendingLeft = null;
  pairPendingRight = null;
  if (pairTimerLeft) { clearTimeout(pairTimerLeft); pairTimerLeft = null; }
  if (pairTimerRight) { clearTimeout(pairTimerRight); pairTimerRight = null; }
  fireSticks = [];
  singleGearEnabled = false;
  cloudEnabled = false;
  cloudOffsetLeft = -W / 2 - cloudThickness * 0.55;
  cloudOffsetRight = W / 2 + cloudThickness * 0.55;
  lightningEffects = [];
}

// 根据当前关卡初始化倒计时（从关卡配置读取）
function initCountdown() {
  const lvl = findLevel(currentLevelId);
  const cd = lvl ? lvl.countdown : 'none';
  if (cd === 'total') {
    countdown = lvl.totalTime || 60;
    countdownMode = 2;
  } else if (cd === 'single') {
    countdown = countdownMax;
    countdownMode = 1;
  } else {
    countdown = 0;
    countdownMode = 0;
  }
}

// 绘制星星（背景共用）
function drawStars(count, sizeBase, sizeStep, alphaBase, twinkleSpeed, yRatio) {
  const t = Date.now() / 1000;
  for (let i = 0; i < count; i++) {
    const sx = ((i * 7919 + 123) % 1000) / 1000 * W;
    const sy = ((i * 104729 + 456) % 1000) / 1000 * H * (yRatio || 1);
    const twinkle = twinkleSpeed > 0 ? (alphaBase + (1 - alphaBase) * Math.abs(Math.sin(t * (twinkleSpeed + i * 0.07) + i * 2.1))) : (alphaBase + (i % 5) * 0.1);
    const size = sizeBase + (i % 4) * sizeStep;
    ctx.fillStyle = i % 10 === 0 ? `rgba(180,200,255,${twinkle})` : `rgba(255,255,255,${twinkle})`;
    ctx.beginPath();
    ctx.arc(sx, sy, size, 0, Math.PI * 2);
    ctx.fill();
  }
}
